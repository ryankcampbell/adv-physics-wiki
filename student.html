<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Physics — Student Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-title {
      font-size: 1.1rem; font-weight: 700; color: #7eb8da; letter-spacing: 0.04em;
    }
    .logo-sub { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    label {
      display: block; font-size: 0.78rem; color: #94a3b8;
      margin-bottom: 6px; margin-top: 16px;
    }
    select, input[type="password"] {
      width: 100%; padding: 10px 12px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 0.9rem;
      appearance: none; -webkit-appearance: none;
      background-image: none;
    }
    select { cursor: pointer; }
    select:focus, input:focus { outline: none; border-color: #7eb8da; }
    select option { background: #1e293b; }
    .btn {
      width: 100%; padding: 11px; margin-top: 24px;
      background: #2563eb; color: white; border: none;
      border-radius: 6px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error {
      margin-top: 14px; padding: 9px 12px;
      background: #450a0a; border: 1px solid #dc2626;
      border-radius: 6px; font-size: 0.8rem; color: #fca5a5;
      display: none;
    }
    .divider { border: none; border-top: 1px solid #1e293b; margin: 28px 0 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-title">✦ Advanced Physics Wiki</div>
    <div class="logo-sub">Student Portal</div>
  </div>

  <label for="name-select">Your name</label>
  <select id="name-select">
    <option value="">— Select your name —</option>
  </select>

  <label for="pw-input">Password</label>
  <input type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password">

  <button class="btn" id="login-btn" onclick="login()">Enter</button>
  <div class="error" id="error-msg"></div>
</div>

<script>
const STUDENT_TOKEN_KEY = 'student-session-token';
const STUDENT_NAME_KEY  = 'student-name';
const SIM_TOKEN_KEY     = 'sim-session-token';

// If already logged in, go straight to workspace
if (localStorage.getItem(STUDENT_TOKEN_KEY)) {
  window.location.href = 'workspace.html';
}

// Load student names
async function loadNames() {
  try {
    const r = await fetch('/api/students/list');
    const { names } = await r.json();
    const sel = document.getElementById('name-select');
    names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n.replace(/\b\w/g, c => c.toUpperCase());
      sel.appendChild(opt);
    });
  } catch(e) {
    showError('Could not reach the server. Is it running?');
  }
}

async function login() {
  const name = document.getElementById('name-select').value;
  const password = document.getElementById('pw-input').value;
  const btn = document.getElementById('login-btn');

  if (!name) { showError('Please select your name.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';
  hideError();

  try {
    const r = await fetch('/api/student/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password })
    });
    const data = await r.json();
    if (!r.ok) { showError(data.error || 'Login failed.'); btn.disabled = false; btn.textContent = 'Enter'; return; }

    // Store student session
    localStorage.setItem(STUDENT_TOKEN_KEY, data.token);
    localStorage.setItem(STUDENT_NAME_KEY, data.name);
    // Pre-store sim token so AI tool doesn't need a second password
    localStorage.setItem(SIM_TOKEN_KEY, data.simToken);

    window.location.href = 'workspace.html';
  } catch(e) {
    showError('Connection error — is the server running?');
    btn.disabled = false; btn.textContent = 'Enter';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

// Allow Enter key to submit
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

loadNames();
</script>
</body>
</html>
