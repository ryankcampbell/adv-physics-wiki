  <div class=&quot;subtitle&quot;>How fast must a rocket travel for Earth to watch 2001: A Space Odyssey in slow-motion?</div>

          </div>
          <div style=&quot;font-size: 10px; color: #666; margin-top: 5px;&quot;>
            $$\gamma = \frac{1}{\sqrt{1-\beta^2}}$$
          </div>
        </div>
      </div>
      
      <div class=&quot;panel&quot;>
        <h3>🚀 Rocket Frame (S)</h3>
        <div class=&quot;readout&quot;>
          <div class=&quot;readout-row&quot;>

            <span class=&quot;readout-value&quot; id=&quot;rocketTime&quot;>139 min</span>
          </div>
        </div>
      </div>
      
      <div class=&quot;panel&quot;>
        <h3>🌍 Earth Frame (S')</h3>
        <div class=&quot;readout&quot;>
          <div class=&quot;readout-row&quot;>
            <span class=&quot;readout-label&quot;>Observed Duration</span>
            <span class=&quot;readout-value&quot; id=&quot;earthTime&quot;>160.7 min</span>
          </div>
          <div class=&quot;readout-row&quot;>
            <span class=&quot;readout-label&quot;>Time Dilated</span>
            <span class=&quot;readout-value&quot; id=&quot;timeDiff&quot;>+21.7 min</span>
          </div>
          <div style=&quot;font-size: 10px; color: #666; margin-top: 5px;&quot;>
            $$\Delta t' = \gamma \Delta t$$
          </div>
        </div>
      </div>
    </div>
    
    <!-- CANVAS -->
    <div class=&quot;canvas-wrap&quot;>
      <canvas id=&quot;canvas&quot;></canvas>

    </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 900;
    canvas.height = 500;
    
    const betaSlider = document.getElementById('betaSlider');
    const betaVal = document.getElementById('betaVal');
    const gammaVal = document.getElementById('gammaVal');
    const rocketTime = document.getElementById('rocketTime');
    const earthTime = document.getElementById('earthTime');
    const timeDiff = document.getElementById('timeDiff');
    
    const restDuration = 139; // minutes
    
    function updateValues() {
      const beta = parseFloat(betaSlider.value);
      betaVal.textContent = beta.toFixed(2);
      
      // Lorentz factor: γ = 1 / sqrt(1 - β²)
      const gamma = 1 / Math.sqrt(1 - beta * beta);
      gammaVal.textContent = gamma.toFixed(3);
      
      // Time dilation: Δt' = γ * Δt
      const dilatedTime = gamma * restDuration;
      earthTime.textContent = dilatedTime.toFixed(1) + ' min';
      timeDiff.textContent = '+' + (dilatedTime - restDuration).toFixed(1) + ' min';
      
      draw(beta, gamma);
    }
    
    function draw(beta, gamma) {
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Title
      ctx.fillStyle = '#c8d8e8';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('2001: A Space Odyssey - Time Dilation Visualization', 30, 30);
      
      // ===== ROCKET FRAME (S) =====
      ctx.fillStyle = '#7eb8da';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText('Rocket Frame (S) — Proper Time', 30, 70);
      
      // Rocket ship
      ctx.fillStyle = '#e07050';
      ctx.beginPath();
      ctx.moveTo(50, 110);
      ctx.lineTo(80, 100);
      ctx.lineTo(85, 120);
      ctx.lineTo(50, 135);
      ctx.closePath();
      ctx.fill();
      
      // Rocket label
      ctx.fillStyle = '#aaa';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('v = βc', 60, 155);
      
      // Movie screen
      const screenX = 140;
      const screenY = 95;
      const screenW = 200;
      const screenH = 60;
      
      ctx.strokeStyle = '#7eb8da';
      ctx.lineWidth = 2;
      ctx.fillStyle = '#1a3a4a';
      ctx.fillRect(screenX, screenY, screenW, screenH);
      ctx.strokeRect(screenX, screenY, screenW, screenH);
      
      ctx.fillStyle = '#aaa';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('2001: A Space Odyssey', screenX + screenW/2, screenY + 20);
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#7eb8da';
      ctx.fillText(restDuration + ' min', screenX + screenW/2, screenY + 45);
      
      // Movie playback bar for rocket
      const barX = 140;
      const barY = 175;
      const barW = 200;
      const barH = 15;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#6ecf6e';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.strokeStyle = '#7eb8da';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
      
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('∆t = 139 min (invariant)', barX + barW/2, barY + 28);
      
      // ===== EARTH FRAME (S') =====
      ctx.fillStyle = '#7eb8da';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('Earth Frame (S\') — Dilated Time', 30, 260);
      
      // Earth
      ctx.fillStyle = '#4a7a9a';
      ctx.beginPath();
      ctx.arc(65, 310, 25, 0, 2 * Math.PI);
      ctx.fill();
      ctx.strokeStyle = '#7eb8da';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // Observer
      ctx.fillStyle = '#aaa';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('Observer', 55, 345);
      
      // Movie screen (stretched)
      const screenX2 = 140;
      const screenY2 = 280;
      const screenW2 = 200;
      const screenH2 = 60;
      
      ctx.strokeStyle = '#e07050';
      ctx.lineWidth = 2;
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(screenX2, screenY2, screenW2, screenH2);
      ctx.strokeRect(screenX2, screenY2, screenW2, screenH2);
      
      ctx.fillStyle = '#aaa';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('2001: A Space Odyssey', screenX2 + screenW2/2, screenY2 + 20);
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#e07050';
      const dilatedDur = (gamma * restDuration).toFixed(1);
      ctx.fillText(dilatedDur + ' min', screenX2 + screenW2/2, screenY2 + 45);
      
      // Movie playback bar for Earth (longer)
      const barX2 = 140;
      const barY2 = 360;
      const barW2 = 200 * gamma / 2; // scale it so we can see the difference
      const barH2 = 15;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX2, barY2, 200, barH2);
      ctx.fillStyle = '#e8c050';
      ctx.fillRect(barX2, barY2, Math.min(barW2, 200), barH2);
      ctx.strokeStyle = '#e07050';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX2, barY2, 200, barH2);
      
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('∆t\' = γ × 139 min (dilated)', barX2 + 100, barY2 + 28);
      
      // Arrow connecting the two
      ctx.strokeStyle = '#667';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(100, 180);
      ctx.lineTo(100, 350);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Gamma factor callout
      const calloutX = 420;
      const calloutY = 200;
      ctx.fillStyle = '#b08aff';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('Lorentz Factor', calloutX, calloutY);
      ctx.font = 'bold 16px monospace';
      ctx.fillText('γ = ' + gamma.toFixed(3), calloutX, calloutY + 25);
      
      ctx.font = '10px sans-serif';
      ctx.fillStyle = '#999';
      ctx.fillText('Time runs slower', calloutX, calloutY + 45);
      ctx.fillText('in the moving frame', calloutX, calloutY + 58);
      
      // Key insight
      ctx.fillStyle = '#6ecf6e';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('✓ Rocket clock ticks slower', 420, 320);
      ctx.fillText('✓ Earth sees extended movie', 420, 340);
      ctx.fillText('✓ Both frames correct (relative)', 420, 360);
      
      // Stats box
      ctx.fillStyle = '#252540';
      ctx.fillRect(420, 400, 300, 80);
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      ctx.strokeRect(420, 400, 300, 80);
      
      ctx.fillStyle = '#aab';
      ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Rocket velocity: v = ' + (beta * 100).toFixed(0) + '% c', 430, 420);
      ctx.fillText('Time dilation factor: ' + gamma.toFixed(3) + 'x', 430, 437);
      ctx.fillText('Extra time on Earth: ' + ((gamma - 1) * restDuration).toFixed(1) + ' min', 430, 454);
      ctx.fillText('Duration ratio: ' + (gamma * restDuration).toFixed(1) + ' / 139', 430, 471);
    }
    
    betaSlider.addEventListener('input', updateValues);
    
    // Initial draw
    updateValues();
  </script>

ckground: #1a1a2e; color: #eee;\n    }\n    h1 { text-align: center; font-size: 22px; color: #c8d8e8; margin: 8px 0 4px; }\n    .subtitle { text-align: center; font-size: 12px; color: #667; margin-bottom: 12px; }\n    \n    .main-row { display: flex; gap: 14px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }\n    .sidebar { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }\n    .canvas-wrap { flex: 1; min-width: 0; }\n    canvas { display: block; width: 100%; height: 500px; border-radius: 8px; background: #0d0d1a; }\n    \n    .panel { background: #252540; padding: 12px; border-radius: 8px; }\n    .panel h3 { margin: 0 0 8px; color: #7eb8da; font-size: 13px;\n                border-bottom: 1px solid #3a3a5a; padding-bottom: 5px; }\n    \n    .slider-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }\n    .slider-row label { font-size: 11px; color: #aab; min-width: 90px; }\n    .slider-row input[type=range] { flex: 1; accent-color: #7eb8da; }\n    .slider-row .val { font-size: 11px; color: #7eb8da; min-width: 70px;\n                       text-align: right; font-family: monospace; }\n    \n    .readout { background: #1a1a2e; border-radius: 6px; padding: 10px;\n               font-family: monospace; font-size: 12px; line-height: 1.8; margin-top: 6px; }\n    .readout-row { display: flex; justify-content: space-between; }\n    .readout-label { color: #8899aa; }\n    .readout-value { color: #7eb8da; }\n    \n    .caption { text-align: center; font-size: 11px; color: #667; margin-top: 8px; font-style: italic; }\n  <\/style>\n<\/head>\n<body>\n  <h1>Time Dilation: The Movie Paradox<\/h1>\n  <div class=\"subtitle\">How fast must a rocket travel for Earth to watch 2001: A Space Odyssey in slow-motion?<\/div>\n  \n  <div class=\"main-row\">\n    <!-- SIDEBAR -->\n    <div class=\"sidebar\">\n      <div class=\"panel\">\n        <h3>⚙ Parameters<\/h3>\n        <div class=\"slider-row\">\n          <label>β (v/c)<\/label>\n          <input type=\"range\" id=\"betaSlider\" min=\"0\" max=\"0.99\" step=\"0.01\" value=\"0.5\">\n          <span class=\"val\" id=\"betaVal\">0.50<\/span>\n        <\/div>\n      <\/div>\n      \n      <div class=\"panel\">\n        <h3>📊 Lorentz Factor<\/h3>\n        <div class=\"readout\">\n          <div class=\"readout-row\">\n            <span class=\"readout-label\">γ =<\/span>\n            <span class=\"readout-value\" id=\"gammaVal\">1.155<\/span>\n          <\/div>\n          <div style=\"font-size: 10px; color: #666; margin-top: 5px;\">\n            $$\\gamma = \\frac{1}{\\sqrt{1-\\beta^2}}$$\n          <\/div>\n        <\/div>\n      <\/div>\n      \n      <div class=\"panel\">\n        <h3>🚀 Rocket Frame (S)<\/h3>\n        <div class=\"readout\">\n          <div class=\"readout-row\">\n            <span class=\"readout-label\">Movie Duration<\/span>\n            <span class=\"readout-value\" id=\"rocketTime\">139 min<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n      \n      <div class=\"panel\">\n        <h3>🌍 Earth Frame (S')<\/h3>\n        <div class=\"readout\">\n          <div class=\"readout-row\">\n            <span class=\"readout-label\">Observed Duration<\/span>\n            <span class=\"readout-value\" id=\"earthTime\">160.7 min<\/span>\n          <\/div>\n          <div class=\"readout-row\">\n            <span class=\"readout-label\">Time Dilated<\/span>\n            <span class=\"readout-value\" id=\"timeDiff\">+21.7 min<\/span>\n          <\/div>\n          <div style=\"font-size: 10px; color: #666; margin-top: 5px;\">\n            $$\\Delta t' = \\gamma \\Delta t$$\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    \n    <!-- CANVAS -->\n    <div class=\"canvas-wrap\">\n      <canvas id=\"canvas\"><\/canvas>\n      <div class=\"caption\">The rocket (moving at speed $v = \\beta c$) appears to experience time dilation. Earth observers measure a longer movie duration.<\/div>\n    <\/div>\n  <\/div>\n\n  <script>\n    const canvas = document.getElementById('canvas');\n    const ctx = canvas.getContext('2d');\n    \n    canvas.width = 900;\n    canvas.height = 500;\n    \n    const betaSlider = document.getElementById('betaSlider');\n    const betaVal = document.getElementById('betaVal');\n    const gammaVal = document.getElementById('gammaVal');\n    const rocketTime = document.getElementById('rocketTime');\n    const earthTime = document.getElementById('earthTime');\n    const timeDiff = document.getElementById('timeDiff');\n    \n    const restDuration = 139; // minutes\n    \n    function updateValues() {\n      const beta = parseFloat(betaSlider.value);\n      betaVal.textContent = beta.toFixed(2);\n      \n      // Lorentz factor: γ = 1 / sqrt(1 - β²)\n      const gamma = 1 / Math.sqrt(1 - beta * beta);\n      gammaVal.textContent = gamma.toFixed(3);\n      \n      // Time dilation: Δt' = γ * Δt\n      const dilatedTime = gamma * restDuration;\n      earthTime.textContent = dilatedTime.toFixed(1) + ' min';\n      timeDiff.textContent = '+' + (dilatedTime - restDuration).toFixed(1) + ' min';\n      \n      draw(beta, gamma);\n    }\n    \n    function draw(beta, gamma) {\n      ctx.fillStyle = '#0d0d1a';\n      ctx.fillRect(0, 0, canvas.width, canvas.height);\n      \n      // Title\n      ctx.fillStyle = '#c8d8e8';\n      ctx.font = 'bold 16px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('2001: A Space Odyssey - Time Dilation Visualization', 30, 30);\n      \n      // ===== ROCKET FRAME (S) =====\n      ctx.fillStyle = '#7eb8da';\n      ctx.font = 'bold 13px sans-serif';\n      ctx.fillText('Rocket Frame (S) — Proper Time', 30, 70);\n      \n      // Rocket ship\n      ctx.fillStyle = '#e07050';\n      ctx.beginPath();\n      ctx.moveTo(50, 110);\n      ctx.lineTo(80, 100);\n      ctx.lineTo(85, 120);\n      ctx.lineTo(50, 135);\n      ctx.closePath();\n      ctx.fill();\n      \n      // Rocket label\n      ctx.fillStyle = '#aaa';\n      ctx.font = '11px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('v = βc', 60, 155);\n      \n      // Movie screen\n      const screenX = 140;\n      const screenY = 95;\n      const screenW = 200;\n      const screenH = 60;\n      \n      ctx.strokeStyle = '#7eb8da';\n      ctx.lineWidth = 2;\n      ctx.fillStyle = '#1a3a4a';\n      ctx.fillRect(screenX, screenY, screenW, screenH);\n      ctx.strokeRect(screenX, screenY, screenW, screenH);\n      \n      ctx.fillStyle = '#aaa';\n      ctx.font = '12px sans-serif';\n      ctx.textAlign = 'center';\n      ctx.fillText('2001: A Space Odyssey', screenX + screenW/2, screenY + 20);\n      ctx.font = 'bold 14px sans-serif';\n      ctx.fillStyle = '#7eb8da';\n      ctx.fillText(restDuration + ' min', screenX + screenW/2, screenY + 45);\n      \n      // Movie playback bar for rocket\n      const barX = 140;\n      const barY = 175;\n      const barW = 200;\n      const barH = 15;\n      ctx.fillStyle = '#333';\n      ctx.fillRect(barX, barY, barW, barH);\n      ctx.fillStyle = '#6ecf6e';\n      ctx.fillRect(barX, barY, barW, barH);\n      ctx.strokeStyle = '#7eb8da';\n      ctx.lineWidth = 1;\n      ctx.strokeRect(barX, barY, barW, barH);\n      \n      ctx.fillStyle = '#aaa';\n      ctx.font = '10px monospace';\n      ctx.textAlign = 'center';\n      ctx.fillText('∆t = 139 min (invariant)', barX + barW/2, barY + 28);\n      \n      // ===== EARTH FRAME (S') =====\n      ctx.fillStyle = '#7eb8da';\n      ctx.font = 'bold 13px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('Earth Frame (S\\') — Dilated Time', 30, 260);\n      \n      // Earth\n      ctx.fillStyle = '#4a7a9a';\n      ctx.beginPath();\n      ctx.arc(65, 310, 25, 0, 2 * Math.PI);\n      ctx.fill();\n      ctx.strokeStyle = '#7eb8da';\n      ctx.lineWidth = 2;\n      ctx.stroke();\n      \n      // Observer\n      ctx.fillStyle = '#aaa';\n      ctx.font = '11px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('Observer', 55, 345);\n      \n      // Movie screen (stretched)\n      const screenX2 = 140;\n      const screenY2 = 280;\n      const screenW2 = 200;\n      const screenH2 = 60;\n      \n      ctx.strokeStyle = '#e07050';\n      ctx.lineWidth = 2;\n      ctx.fillStyle = '#3a2a1a';\n      ctx.fillRect(screenX2, screenY2, screenW2, screenH2);\n      ctx.strokeRect(screenX2, screenY2, screenW2, screenH2);\n      \n      ctx.fillStyle = '#aaa';\n      ctx.font = '12px sans-serif';\n      ctx.textAlign = 'center';\n      ctx.fillText('2001: A Space Odyssey', screenX2 + screenW2/2, screenY2 + 20);\n      ctx.font = 'bold 14px sans-serif';\n      ctx.fillStyle = '#e07050';\n      const dilatedDur = (gamma * restDuration).toFixed(1);\n      ctx.fillText(dilatedDur + ' min', screenX2 + screenW2/2, screenY2 + 45);\n      \n      // Movie playback bar for Earth (longer)\n      const barX2 = 140;\n      const barY2 = 360;\n      const barW2 = 200 * gamma / 2; // scale it so we can see the difference\n      const barH2 = 15;\n      ctx.fillStyle = '#333';\n      ctx.fillRect(barX2, barY2, 200, barH2);\n      ctx.fillStyle = '#e8c050';\n      ctx.fillRect(barX2, barY2, Math.min(barW2, 200), barH2);\n      ctx.strokeStyle = '#e07050';\n      ctx.lineWidth = 1;\n      ctx.strokeRect(barX2, barY2, 200, barH2);\n      \n      ctx.fillStyle = '#aaa';\n      ctx.font = '10px monospace';\n      ctx.textAlign = 'center';\n      ctx.fillText('∆t\\' = γ × 139 min (dilated)', barX2 + 100, barY2 + 28);\n      \n      // Arrow connecting the two\n      ctx.strokeStyle = '#667';\n      ctx.lineWidth = 1;\n      ctx.setLineDash([5, 5]);\n      ctx.beginPath();\n      ctx.moveTo(100, 180);\n      ctx.lineTo(100, 350);\n      ctx.stroke();\n      ctx.setLineDash([]);\n      \n      // Gamma factor callout\n      const calloutX = 420;\n      const calloutY = 200;\n      ctx.fillStyle = '#b08aff';\n      ctx.font = 'bold 12px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('Lorentz Factor', calloutX, calloutY);\n      ctx.font = 'bold 16px monospace';\n      ctx.fillText('γ = ' + gamma.toFixed(3), calloutX, calloutY + 25);\n      \n      ctx.font = '10px sans-serif';\n      ctx.fillStyle = '#999';\n      ctx.fillText('Time runs slower', calloutX, calloutY + 45);\n      ctx.fillText('in the moving frame', calloutX, calloutY + 58);\n      \n      // Key insight\n      ctx.fillStyle = '#6ecf6e';\n      ctx.font = 'bold 11px sans-serif';\n      ctx.textAlign = 'left';\n      ctx.fillText('✓ Rocket clock ticks slower', 420, 320);\n      ctx.fillText('✓ Earth sees extended movie', 420, 340);\n      ctx.fillText('✓ Both frames correct (relative)', 420, 360);\n      \n      // Stats box\n      ctx.fillStyle = '#252540';\n      ctx.fillRect(420, 400, 300, 80);\n      ctx.strokeStyle = '#3a3a5a';\n      ctx.lineWidth = 1;\n      ctx.strokeRect(420, 400, 300, 80);\n      \n      ctx.fillStyle = '#aab';\n      ctx.font = '11px monospace';\n      ctx.textAlign = 'left';\n      ctx.fillText('Rocket velocity: v = ' + (beta * 100).toFixed(0) + '% c', 430, 420);\n      ctx.fillText('Time dilation factor: ' + gamma.toFixed(3) + 'x', 430, 437);\n      ctx.fillText('Extra time on Earth: ' + ((gamma - 1) * restDuration).toFixed(1) + ' min', 430, 454);\n      ctx.fillText('Duration ratio: ' + (gamma * restDuration).toFixed(1) + ' / 139', 430, 471);\n    }\n    \n    betaSlider.addEventListener('input', updateValues);\n    \n    // Initial draw\n    updateValues();\n  <\/script>\n<\/body>\n<\/html>","__sim_name":"ai-sim.html","__cits":[]}</script>
