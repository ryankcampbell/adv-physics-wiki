  <h1>Galilean Velocity Transformation</h1>
  <p class=&quot;subtitle&quot;>Watch how velocity changes between reference frames</p>
  
  <div class=&quot;main-row&quot;>
    <div class=&quot;sidebar&quot;>
      <div class=&quot;panel&quot;>
        <h3>Ball Velocity (Frame S)</h3>
        <div class=&quot;slider-row&quot;>
          <label>u:</label>
          <input type=&quot;range&quot; id=&quot;uSlider&quot; min=&quot;-100&quot; max=&quot;100&quot; value=&quot;30&quot; step=&quot;2&quot;>
          <span class=&quot;val&quot; id=&quot;uVal&quot;>30 m/s</span>
        </div>
      </div>
      
      <div class=&quot;panel&quot;>
        <h3>Frame S' Velocity</h3>
        <div class=&quot;slider-row&quot;>
          <label>v:</label>
          <input type=&quot;range&quot; id=&quot;vSlider&quot; min=&quot;-60&quot; max=&quot;60&quot; value=&quot;20&quot; step=&quot;2&quot;>
          <span class=&quot;val&quot; id=&quot;vVal&quot;>20 m/s</span>
        </div>
      </div>
      
      <div class=&quot;panel&quot;>
        <h3>Transformation</h3>
        <div class=&quot;equation&quot;>$$u' = u - v$$</div>
        <div class=&quot;readout&quot;>
          <div class=&quot;readout-row&quot;>
            <span class=&quot;readout-label&quot;>u (Frame S):</span>
            <span class=&quot;readout-value&quot; id=&quot;readoutU&quot;>30 m/s</span>
          </div>
          <div class=&quot;readout-row&quot;>
            <span class=&quot;readout-label&quot;>v (Frame vel):</span>
            <span class=&quot;readout-value&quot; id=&quot;readoutV&quot;>20 m/s</span>
          </div>
          <div class=&quot;readout-row&quot;>
            <span class=&quot;readout-label&quot;>u' (Frame S'):</span>
            <span class=&quot;readout-value&quot; id=&quot;readoutUPrime&quot;>10 m/s</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class=&quot;canvas-wrap&quot;>
      <div class=&quot;frame-label&quot;>Frame S (Stationary)</div>
      <canvas id=&quot;canvasS&quot; width=&quot;800&quot; height=&quot;120&quot;></canvas>
      
      <div class=&quot;frame-label&quot;>Frame S' (Moving at v = <span id=&quot;frameVelLabel&quot;>20</span> m/s)</div>
      <canvas id=&quot;canvasSPrime&quot; width=&quot;800&quot; height=&quot;120&quot;></canvas>
    </div>
  </div>

  <script>
    const uSlider = document.getElementById('uSlider');
    const vSlider = document.getElementById('vSlider');
    
    const uVal = document.getElementById('uVal');
    const vVal = document.getElementById('vVal');
    
    const readoutU = document.getElementById('readoutU');
    const readoutV = document.getElementById('readoutV');
    const readoutUPrime = document.getElementById('readoutUPrime');
    const frameVelLabel = document.getElementById('frameVelLabel');
    
    const canvasS = document.getElementById('canvasS');
    const ctxS = canvasS.getContext('2d');
    
    const canvasSPrime = document.getElementById('canvasSPrime');
    const ctxSPrime = canvasSPrime.getContext('2d');

    let t = 0;
    const ballRadius = 8;
    const pixelsPerMeter = 3; // 3 pixels per m/s of velocity displayed

    function update() {
      const u = parseFloat(uSlider.value);
      const v = parseFloat(vSlider.value);
      const uPrime = u - v;

      // Update display
      uVal.textContent = u + ' m/s';
      vVal.textContent = v + ' m/s';
      readoutU.textContent = u + ' m/s';
      readoutV.textContent = v + ' m/s';
      readoutUPrime.textContent = uPrime + ' m/s';
      frameVelLabel.textContent = v;

      // Position in Frame S: x = u * t
      const xS = 400 + u * pixelsPerMeter * (t % 10) / 10;

      // Position in Frame S': x' = u' * t (or equivalently, x - v*t relative to origin)
      const xSPrime = 400 + uPrime * pixelsPerMeter * (t % 10) / 10;

      // Draw Frame S
      ctxS.clearRect(0, 0, canvasS.width, canvasS.height);
      
      // Draw grid/axis
      ctxS.strokeStyle = '#3a3a5a';
      ctxS.lineWidth = 1;
      ctxS.beginPath();
      ctxS.moveTo(0, 60);
      ctxS.lineTo(canvasS.width, 60);
      ctxS.stroke();

      // Draw origin marker
      ctxS.fillStyle = '#5a5a8a';
      ctxS.fillRect(50, 55, 2, 10);

      // Draw ball in Frame S
      ctxS.fillStyle = '#6ecf6e';
      ctxS.beginPath();
      ctxS.arc(xS, 60, ballRadius, 0, Math.PI * 2);
      ctxS.fill();

      // Velocity vector for Frame S
      ctxS.strokeStyle = '#7eb8da';
      ctxS.lineWidth = 2;
      ctxS.beginPath();
      ctxS.moveTo(xS, 60);
      ctxS.lineTo(xS + u * pixelsPerMeter * 0.5, 60);
      ctxS.stroke();
      
      ctxS.fillStyle = '#7eb8da';
      ctxS.font = '12px monospace';
      ctxS.textAlign = 'center';
      ctxS.fillText('u = ' + u + ' m/s', canvasS.width - 80, 20);

      // Draw Frame S'
      ctxSPrime.clearRect(0, 0, canvasSPrime.width, canvasSPrime.height);
      
      // Draw grid/axis
      ctxSPrime.strokeStyle = '#3a3a5a';
      ctxSPrime.lineWidth = 1;
      ctxSPrime.beginPath();
      ctxSPrime.moveTo(0, 60);
      ctxSPrime.lineTo(canvasSPrime.width, 60);
      ctxSPrime.stroke();

      // Draw origin marker
      ctxSPrime.fillStyle = '#5a5a8a';
      ctxSPrime.fillRect(50, 55, 2, 10);

      // Draw ball in Frame S'
      ctxSPrime.fillStyle = '#6ecf6e';
      ctxSPrime.beginPath();
      ctxSPrime.arc(xSPrime, 60, ballRadius, 0, Math.PI * 2);
      ctxSPrime.fill();

      // Velocity vector for Frame S'
      ctxSPrime.strokeStyle = '#e8c050';
      ctxSPrime.lineWidth = 2;
      ctxSPrime.beginPath();
      ctxSPrime.moveTo(xSPrime, 60);
      ctxSPrime.lineTo(xSPrime + uPrime * pixelsPerMeter * 0.5, 60);
      ctxSPrime.stroke();

      ctxSPrime.fillStyle = '#e8c050';
      ctxSPrime.font = '12px monospace';
      ctxSPrime.textAlign = 'center';
      ctxSPrime.fillText(&quot;u' = &quot; + uPrime + ' m/s', canvasSPrime.width - 80, 20);

      // Frame S' reference motion (dashed line showing frame velocity)
      ctxSPrime.strokeStyle = '#b08aff';
      ctxSPrime.lineWidth = 1;
      ctxSPrime.setLineDash([4, 4]);
      ctxSPrime.beginPath();
      ctxSPrime.moveTo(50, 85);
      ctxSPrime.lineTo(50 + v * pixelsPerMeter * 0.5, 85);
      ctxSPrime.stroke();
      ctxSPrime.setLineDash([]);
      
      ctxSPrime.fillStyle = '#b08aff';
      ctxSPrime.font = '11px monospace';
      ctxSPrime.fillText('v = ' + v + ' m/s', 50 + v * pixelsPerMeter * 0.25, 100);
    }

    function animate() {
      update();
      t += 1;
      requestAnimationFrame(animate);
    }

    uSlider.addEventListener('input', update);
    vSlider.addEventListener('input', update);

    animate();
  </script>

ById('uSlider');\n    const vSlider = document.getElementById('vSlider');\n    \n    const uVal = document.getElementById('uVal');\n    const vVal = document.getElementById('vVal');\n    \n    const readoutU = document.getElementById('readoutU');\n    const readoutV = document.getElementById('readoutV');\n    const readoutUPrime = document.getElementById('readoutUPrime');\n    const frameVelLabel = document.getElementById('frameVelLabel');\n    \n    const canvasS = document.getElementById('canvasS');\n    const ctxS = canvasS.getContext('2d');\n    \n    const canvasSPrime = document.getElementById('canvasSPrime');\n    const ctxSPrime = canvasSPrime.getContext('2d');\n\n    let t = 0;\n    const ballRadius = 8;\n    const pixelsPerMeter = 3; // 3 pixels per m/s of velocity displayed\n\n    function update() {\n      const u = parseFloat(uSlider.value);\n      const v = parseFloat(vSlider.value);\n      const uPrime = u - v;\n\n      // Update display\n      uVal.textContent = u + ' m/s';\n      vVal.textContent = v + ' m/s';\n      readoutU.textContent = u + ' m/s';\n      readoutV.textContent = v + ' m/s';\n      readoutUPrime.textContent = uPrime + ' m/s';\n      frameVelLabel.textContent = v;\n\n      // Position in Frame S: x = u * t\n      const xS = 400 + u * pixelsPerMeter * (t % 10) / 10;\n\n      // Position in Frame S': x' = u' * t (or equivalently, x - v*t relative to origin)\n      const xSPrime = 400 + uPrime * pixelsPerMeter * (t % 10) / 10;\n\n      // Draw Frame S\n      ctxS.clearRect(0, 0, canvasS.width, canvasS.height);\n      \n      // Draw grid/axis\n      ctxS.strokeStyle = '#3a3a5a';\n      ctxS.lineWidth = 1;\n      ctxS.beginPath();\n      ctxS.moveTo(0, 60);\n      ctxS.lineTo(canvasS.width, 60);\n      ctxS.stroke();\n\n      // Draw origin marker\n      ctxS.fillStyle = '#5a5a8a';\n      ctxS.fillRect(50, 55, 2, 10);\n\n      // Draw ball in Frame S\n      ctxS.fillStyle = '#6ecf6e';\n      ctxS.beginPath();\n      ctxS.arc(xS, 60, ballRadius, 0, Math.PI * 2);\n      ctxS.fill();\n\n      // Velocity vector for Frame S\n      ctxS.strokeStyle = '#7eb8da';\n      ctxS.lineWidth = 2;\n      ctxS.beginPath();\n      ctxS.moveTo(xS, 60);\n      ctxS.lineTo(xS + u * pixelsPerMeter * 0.5, 60);\n      ctxS.stroke();\n      \n      ctxS.fillStyle = '#7eb8da';\n      ctxS.font = '12px monospace';\n      ctxS.textAlign = 'center';\n      ctxS.fillText('u = ' + u + ' m/s', canvasS.width - 80, 20);\n\n      // Draw Frame S'\n      ctxSPrime.clearRect(0, 0, canvasSPrime.width, canvasSPrime.height);\n      \n      // Draw grid/axis\n      ctxSPrime.strokeStyle = '#3a3a5a';\n      ctxSPrime.lineWidth = 1;\n      ctxSPrime.beginPath();\n      ctxSPrime.moveTo(0, 60);\n      ctxSPrime.lineTo(canvasSPrime.width, 60);\n      ctxSPrime.stroke();\n\n      // Draw origin marker\n      ctxSPrime.fillStyle = '#5a5a8a';\n      ctxSPrime.fillRect(50, 55, 2, 10);\n\n      // Draw ball in Frame S'\n      ctxSPrime.fillStyle = '#6ecf6e';\n      ctxSPrime.beginPath();\n      ctxSPrime.arc(xSPrime, 60, ballRadius, 0, Math.PI * 2);\n      ctxSPrime.fill();\n\n      // Velocity vector for Frame S'\n      ctxSPrime.strokeStyle = '#e8c050';\n      ctxSPrime.lineWidth = 2;\n      ctxSPrime.beginPath();\n      ctxSPrime.moveTo(xSPrime, 60);\n      ctxSPrime.lineTo(xSPrime + uPrime * pixelsPerMeter * 0.5, 60);\n      ctxSPrime.stroke();\n\n      ctxSPrime.fillStyle = '#e8c050';\n      ctxSPrime.font = '12px monospace';\n      ctxSPrime.textAlign = 'center';\n      ctxSPrime.fillText(\"u' = \" + uPrime + ' m/s', canvasSPrime.width - 80, 20);\n\n      // Frame S' reference motion (dashed line showing frame velocity)\n      ctxSPrime.strokeStyle = '#b08aff';\n      ctxSPrime.lineWidth = 1;\n      ctxSPrime.setLineDash([4, 4]);\n      ctxSPrime.beginPath();\n      ctxSPrime.moveTo(50, 85);\n      ctxSPrime.lineTo(50 + v * pixelsPerMeter * 0.5, 85);\n      ctxSPrime.stroke();\n      ctxSPrime.setLineDash([]);\n      \n      ctxSPrime.fillStyle = '#b08aff';\n      ctxSPrime.font = '11px monospace';\n      ctxSPrime.fillText('v = ' + v + ' m/s', 50 + v * pixelsPerMeter * 0.25, 100);\n    }\n\n    function animate() {\n      update();\n      t += 1;\n      requestAnimationFrame(animate);\n    }\n\n    uSlider.addEventListener('input', update);\n    vSlider.addEventListener('input', update);\n\n    animate();\n  <\/script>\n<\/body>\n<\/html>","__sim_name":"ai-sim.html","__cits":[]}</script>
