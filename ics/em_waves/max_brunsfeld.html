<script type="application/json" id="ic-source-data">{"f-author":"Max Brunsfeld","f-title":"Light as an Electromagnetic Wave","f-rq":"What is the lowest-frequency electromagnetic wave that can be easily detected by an antenna?","f-expl":"Since light travels at a fixed speed, its frequency is inversely proportional to its wavelength. To detect an electromagnetic wave, an antenna's length needs to be around half the wavelength of the wave. So to detect a very low frequency wave, you would need a very long antenna.","f-sim-cap":"","f-lc1t":"","f-lc1e":"","f-lc1o":"","f-lc2t":"","f-lc2e":"","f-lc2o":"","f-scs":"","f-scp":"","f-scr":"","f-anchor":"","__sim_html":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Antenna Size &amp; Electromagnetic Wave Detection<\/title>\n    <link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css\">\n    <script defer src=\"https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js\"><\/script>\n    <script defer src=\"https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js\"><\/script>\n    <style>\n        * { box-sizing: border-box; }\n        body {\n            font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n            margin: 0; padding: 15px;\n            background: #1a1a2e; color: #eee;\n        }\n        h1 { text-align: center; margin: 8px 0 4px; font-size: 22px; color: #c8d8e8; }\n        .subtitle { text-align: center; font-size: 12px; color: #667; margin-bottom: 12px; }\n\n        /* Tabs */\n        .tabs { display: flex; gap: 5px; margin-bottom: 12px; justify-content: center; flex-wrap: wrap; }\n        .tab-btn {\n            padding: 9px 22px; border: none; background: #2a2a4a; color: #aaa;\n            cursor: pointer; border-radius: 8px 8px 0 0; font-size: 13px; transition: all 0.2s;\n        }\n        .tab-btn:hover { background: #3a3a5a; }\n        .tab-btn.active { background: #4a4a7a; color: #fff; }\n        .tab-content { display: none; }\n        .tab-content.active { display: block; }\n\n        /* Layout */\n        .main-row { display: flex; gap: 14px; max-width: 1500px; margin: 0 auto; align-items: flex-start; }\n        .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }\n        .canvas-wrap { flex: 1; min-width: 0; }\n        canvas { display: block; width: 100%; border-radius: 8px; background: #0d0d1a; }\n\n        .panel {\n            background: #252540; padding: 12px; border-radius: 8px;\n        }\n        .panel h3 {\n            margin: 0 0 8px 0; color: #7eb8da; font-size: 13px;\n            border-bottom: 1px solid #3a3a5a; padding-bottom: 5px;\n        }\n\n        /* Slider Row */\n        .slider-row {\n            display: flex; align-items: center; gap: 8px; margin: 6px 0;\n        }\n        .slider-row label { font-size: 11px; color: #aab; min-width: 90px; }\n        .slider-row input[type=range] { flex: 1; accent-color: #7eb8da; }\n        .slider-row .val { font-size: 11px; color: #7eb8da; min-width: 70px; text-align: right; font-family: monospace; }\n\n        /* Info Text */\n        .info-text { font-size: 11px; color: #99a; line-height: 1.5; }\n        .info-text .hl-green { color: #6ecf6e; font-weight: 600; }\n        .info-text .hl-red { color: #e07050; font-weight: 600; }\n        .info-text .hl-blue { color: #7eb8da; font-weight: 600; }\n        .info-text .hl-gold { color: #e8c050; font-weight: 600; }\n        .info-text .hl-purple { color: #b08aff; font-weight: 600; }\n\n        /* Chip Group */\n        .chip-group { display: flex; flex-wrap: wrap; gap: 5px; }\n        .chip {\n            padding: 5px 10px; font-size: 11px; border-radius: 14px;\n            border: 1px solid #3a3a5a; background: #2a2a4a; color: #bbb;\n            cursor: pointer; transition: all 0.15s; white-space: nowrap;\n        }\n        .chip:hover { background: #3a3a6a; color: #fff; border-color: #7eb8da; }\n        .chip.active { background: #4a4a8a; color: #fff; border-color: #7eb8da; }\n\n        /* Buttons */\n        .btn {\n            padding: 7px 16px; border: none; border-radius: 6px;\n            font-size: 12px; cursor: pointer; transition: all 0.15s;\n            background: #3a3a6a; color: #ccc;\n        }\n        .btn:hover { background: #5a5a8a; color: #fff; }\n        .btn.primary { background: #4a6a9a; color: #fff; }\n        .btn.primary:hover { background: #5a7aaa; }\n        .btn-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }\n\n        .toggle-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 11px; color: #aab; }\n        .toggle-row input[type=checkbox] { accent-color: #7eb8da; }\n\n        /* Spectrum bar */\n        .spectrum-bar {\n            height: 16px; border-radius: 4px; margin: 6px 0;\n            background: linear-gradient(to right,\n                #ff0000, #ff4400, #ff8800, #ffcc00, #ffff00,\n                #88ff00, #00ff00, #00ff88, #00ffff, #0088ff,\n                #0000ff, #4400ff, #8800ff, #cc00ff);\n            position: relative;\n        }\n        .spectrum-marker {\n            position: absolute; top: -3px; width: 3px; height: 22px;\n            background: #fff; border-radius: 2px; transform: translateX(-1px);\n            box-shadow: 0 0 6px #fff;\n        }\n\n        /* Readout */\n        .readout {\n            background: #1a1a2e; border-radius: 6px; padding: 10px;\n            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;\n            line-height: 1.8; margin-top: 6px;\n        }\n        .readout-row { display: flex; justify-content: space-between; }\n        .readout-label { color: #8899aa; }\n        .readout-value { color: #7eb8da; }\n\n        /* Efficiency meter */\n        .eff-bar-wrap {\n            background: #1a1a2e; border-radius: 4px; height: 18px; margin: 4px 0;\n            overflow: hidden; position: relative;\n        }\n        .eff-bar {\n            height: 100%; border-radius: 4px; transition: width 0.15s;\n        }\n        .eff-label {\n            position: absolute; top: 2px; right: 6px; font-size: 10px;\n            color: #fff; font-family: monospace; text-shadow: 0 0 4px #000;\n        }\n\n        /* Band legend */\n        .band-legend { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }\n        .band-swatch {\n            width: 10px; height: 10px; border-radius: 2px; display: inline-block;\n            vertical-align: middle; margin-right: 3px;\n        }\n        .band-item { font-size: 10px; color: #99a; white-space: nowrap; }\n\n        @media (max-width: 850px) {\n            .main-row { flex-direction: column; }\n            .sidebar { width: 100%; }\n        }\n    <\/style>\n<\/head>\n<body>\n\n<h1>Antenna Size &amp; Electromagnetic Wave Detection<\/h1>\n<div class=\"subtitle\">How antenna dimensions determine which frequencies can be received<\/div>\n\n<div class=\"tabs\">\n    <button class=\"tab-btn active\" onclick=\"switchTab(0)\">1. Wave &amp; Antenna<\/button>\n    <button class=\"tab-btn\" onclick=\"switchTab(1)\">2. Frequency Response<\/button>\n    <button class=\"tab-btn\" onclick=\"switchTab(2)\">3. EM Spectrum Explorer<\/button>\n<\/div>\n\n<!-- ===================== TAB 1: WAVE & ANTENNA ===================== -->\n<div class=\"tab-content active\" id=\"tab0\">\n<div class=\"main-row\">\n    <div class=\"sidebar\">\n        <div class=\"panel\">\n            <h3>Antenna Length<\/h3>\n            <div class=\"slider-row\">\n                <label>Length (L)<\/label>\n                <input type=\"range\" id=\"antennaLen\" min=\"-3\" max=\"3\" step=\"0.01\" value=\"0\">\n                <span class=\"val\" id=\"antennaLenVal\">1.00 m<\/span>\n            <\/div>\n            <div class=\"info-text\" style=\"margin-top:4px;\">\n                Drag to set the physical length of the dipole antenna. Log scale: 1 mm to 1 km.\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Incoming Wave<\/h3>\n            <div class=\"slider-row\">\n                <label>Frequency<\/label>\n                <input type=\"range\" id=\"waveFreq\" min=\"3\" max=\"12\" step=\"0.01\" value=\"8.477\">\n                <span class=\"val\" id=\"waveFreqVal\">300 MHz<\/span>\n            <\/div>\n            <div class=\"slider-row\">\n                <label>Wavelength (λ)<\/label>\n                <span class=\"val\" id=\"waveLenVal\" style=\"flex:1; text-align:center;\">1.00 m<\/span>\n            <\/div>\n            <div class=\"info-text\" style=\"margin-top:4px;\">\n                <span class=\"hl-blue\">λ = c / f<\/span> &nbsp; where c = 3×10⁸ m/s\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Antenna Presets<\/h3>\n            <div class=\"chip-group\" id=\"antennaChips\"><\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Detection Efficiency<\/h3>\n            <div class=\"eff-bar-wrap\">\n                <div class=\"eff-bar\" id=\"effBar\" style=\"width:50%; background:#6ecf6e;\"><\/div>\n                <span class=\"eff-label\" id=\"effLabel\">50%<\/span>\n            <\/div>\n            <div class=\"readout\" id=\"readout1\">\n                <div class=\"readout-row\"><span class=\"readout-label\">L / λ ratio:<\/span><span class=\"readout-value\" id=\"ratioVal\">0.50<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Resonance at:<\/span><span class=\"readout-value\" id=\"resFreqVal\">150 MHz<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Band:<\/span><span class=\"readout-value\" id=\"bandVal\">VHF<\/span><\/div>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Display<\/h3>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togWave\" checked><label for=\"togWave\">Show EM wave<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togCurrent\" checked><label for=\"togCurrent\">Show antenna current<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togEField\" checked><label for=\"togEField\">Show E-field arrows<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togLabels\" checked><label for=\"togLabels\">Show labels<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togHuman\" checked><label for=\"togHuman\">Show human for scale<\/label>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Key Idea<\/h3>\n            <div class=\"info-text\">\n                A half-wave dipole antenna resonates best when its length\n                <span class=\"hl-green\">L ≈ λ/2<\/span>. At resonance, the antenna\n                efficiently converts EM waves into electrical current.<br><br>\n                <span class=\"hl-gold\">L/λ = 0.5<\/span> → peak efficiency<br>\n                <span class=\"hl-red\">L/λ ≪ 0.5<\/span> → antenna too short, poor coupling<br>\n                <span class=\"hl-blue\">L/λ ≫ 0.5<\/span> → sidelobes form, efficiency drops\n            <\/div>\n        <\/div>\n    <\/div>\n    <div class=\"canvas-wrap\">\n        <canvas id=\"c1\"><\/canvas>\n    <\/div>\n<\/div>\n<\/div>\n\n<!-- ===================== TAB 2: FREQUENCY RESPONSE ===================== -->\n<div class=\"tab-content\" id=\"tab1\">\n<div class=\"main-row\">\n    <div class=\"sidebar\">\n        <div class=\"panel\">\n            <h3>Antenna Length<\/h3>\n            <div class=\"slider-row\">\n                <label>Length (L)<\/label>\n                <input type=\"range\" id=\"antennaLen2\" min=\"-3\" max=\"3\" step=\"0.01\" value=\"0\">\n                <span class=\"val\" id=\"antennaLen2Val\">1.00 m<\/span>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Antenna Presets<\/h3>\n            <div class=\"chip-group\" id=\"antennaChips2\"><\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Response Info<\/h3>\n            <div class=\"readout\" id=\"readout2\">\n                <div class=\"readout-row\"><span class=\"readout-label\">Resonant freq:<\/span><span class=\"readout-value\" id=\"resFreq2\">150 MHz<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Resonant λ:<\/span><span class=\"readout-value\" id=\"resLam2\">1.00 m<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Usable range:<\/span><span class=\"readout-value\" id=\"usableRange2\">—<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Band:<\/span><span class=\"readout-value\" id=\"bandVal2\">VHF<\/span><\/div>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Display<\/h3>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togBandShading\" checked><label for=\"togBandShading\">Show band shading<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togHarmonics\" checked><label for=\"togHarmonics\">Show harmonics<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togLogScale\" checked><label for=\"togLogScale\">Log frequency axis<\/label>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Key Idea<\/h3>\n            <div class=\"info-text\">\n                The response curve shows how efficiently the antenna couples to waves at each frequency. The fundamental resonance is at <span class=\"hl-green\">f₀ = c / (2L)<\/span>, with harmonic peaks at odd multiples: <span class=\"hl-blue\">3f₀, 5f₀, 7f₀...<\/span><br><br>\n                The <span class=\"hl-gold\">-3 dB bandwidth<\/span> (yellow region) marks the \"usable\" range where efficiency stays above ~50%.\n            <\/div>\n        <\/div>\n    <\/div>\n    <div class=\"canvas-wrap\">\n        <canvas id=\"c2\"><\/canvas>\n    <\/div>\n<\/div>\n<\/div>\n\n<!-- ===================== TAB 3: EM SPECTRUM EXPLORER ===================== -->\n<div class=\"tab-content\" id=\"tab2\">\n<div class=\"main-row\">\n    <div class=\"sidebar\">\n        <div class=\"panel\">\n            <h3>Antenna Size<\/h3>\n            <div class=\"slider-row\">\n                <label>Length (L)<\/label>\n                <input type=\"range\" id=\"antennaLen3\" min=\"-3\" max=\"3\" step=\"0.01\" value=\"0\">\n                <span class=\"val\" id=\"antennaLen3Val\">1.00 m<\/span>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Antenna Presets<\/h3>\n            <div class=\"chip-group\" id=\"antennaChips3\"><\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>EM Band Reference<\/h3>\n            <div class=\"band-legend\" id=\"bandLegend\"><\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Matched Band Info<\/h3>\n            <div class=\"readout\" id=\"readout3\">\n                <div class=\"readout-row\"><span class=\"readout-label\">Resonant freq:<\/span><span class=\"readout-value\" id=\"resFreq3\">150 MHz<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Wavelength:<\/span><span class=\"readout-value\" id=\"resLam3\">2.00 m<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Band:<\/span><span class=\"readout-value\" id=\"bandVal3\">VHF<\/span><\/div>\n                <div class=\"readout-row\"><span class=\"readout-label\">Applications:<\/span><span class=\"readout-value\" id=\"appVal3\" style=\"font-size:10px;\">FM radio, TV<\/span><\/div>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Display<\/h3>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togAntennaScale\" checked><label for=\"togAntennaScale\">Show antenna to scale<\/label>\n            <\/div>\n            <div class=\"toggle-row\">\n                <input type=\"checkbox\" id=\"togCompare\"><label for=\"togCompare\">Compare sizes<\/label>\n            <\/div>\n        <\/div>\n\n        <div class=\"panel\">\n            <h3>Key Idea<\/h3>\n            <div class=\"info-text\">\n                The EM spectrum spans an enormous range. Tiny antennas (mm) detect <span class=\"hl-purple\">microwaves/mm-waves<\/span>, meter-scale antennas detect <span class=\"hl-green\">VHF/UHF<\/span> (TV, FM radio), and kilometer-scale structures detect <span class=\"hl-red\">VLF<\/span> (submarine comms).<br><br>\n                Optical \"antennas\" (your eye's photoreceptors) are ~μm sized, matching visible light wavelengths!\n            <\/div>\n        <\/div>\n    <\/div>\n    <div class=\"canvas-wrap\">\n        <canvas id=\"c3\"><\/canvas>\n    <\/div>\n<\/div>\n<\/div>\n\n<script>\n// ======================== CONSTANTS ========================\nconst DPR = window.devicePixelRatio || 1;\nconst C = 3e8; // speed of light m/s\n\n// Colors matching lorentz.html style\nconst COL_ANTENNA = '#6ecf6e';\nconst COL_WAVE = '#7eb8da';\nconst COL_CURRENT = '#e8c050';\nconst COL_EFIELD = '#e07050';\nconst COL_RES = '#50a0e8';\nconst COL_HARM = '#b08aff';\n\nlet activeTab = 0;\nlet animTime = 0;\nlet animRAF = null;\n\n// ======================== EM BANDS ========================\nconst EM_BANDS = [\n    { name: 'ELF',   fMin: 3,     fMax: 30,     color: '#ff2222', apps: 'Submarine comms' },\n    { name: 'SLF',   fMin: 30,    fMax: 300,    color: '#ff4422', apps: 'Submarine comms' },\n    { name: 'ULF',   fMin: 300,   fMax: 3e3,    color: '#ff6622', apps: 'Mine comms, geophy.' },\n    { name: 'VLF',   fMin: 3e3,   fMax: 30e3,   color: '#ff8822', apps: 'Navigation, time signals' },\n    { name: 'LF',    fMin: 30e3,  fMax: 300e3,  color: '#ffaa22', apps: 'AM longwave radio' },\n    { name: 'MF',    fMin: 300e3, fMax: 3e6,    color: '#ffcc22', apps: 'AM broadcast radio' },\n    { name: 'HF',    fMin: 3e6,   fMax: 30e6,   color: '#ddee22', apps: 'Shortwave, amateur radio' },\n    { name: 'VHF',   fMin: 30e6,  fMax: 300e6,  color: '#88ee22', apps: 'FM radio, TV, aircraft' },\n    { name: 'UHF',   fMin: 300e6, fMax: 3e9,    color: '#22dd66', apps: 'TV, WiFi, cell phones' },\n    { name: 'SHF',   fMin: 3e9,   fMax: 30e9,   color: '#22ccaa', apps: 'Radar, satellite, 5G' },\n    { name: 'EHF',   fMin: 30e9,  fMax: 300e9,  color: '#2299dd', apps: 'mmWave, body scanners' },\n    { name: 'THF',   fMin: 300e9, fMax: 3e12,   color: '#4466ee', apps: 'Terahertz imaging' },\n    { name: 'IR',    fMin: 3e12,  fMax: 4e14,   color: '#8844cc', apps: 'Thermal, remote controls' },\n    { name: 'Visible', fMin: 4e14, fMax: 7.5e14, color: '#cc44aa', apps: 'Human vision, cameras' },\n    { name: 'UV',    fMin: 7.5e14, fMax: 3e16,  color: '#aa22cc', apps: 'Sterilization, tanning' },\n];\n\n// ======================== ANTENNA PRESETS ========================\nconst ANTENNA_PRESETS = [\n    { name: '1 mm (mmWave)', logLen: -3 },\n    { name: '1 cm (WiFi)', logLen: -2 },\n    { name: '6 cm (5G)', logLen: Math.log10(0.06) },\n    { name: '12 cm (WiFi 2.4G)', logLen: Math.log10(0.12) },\n    { name: '50 cm (UHF TV)', logLen: Math.log10(0.5) },\n    { name: '1 m (VHF)', logLen: 0 },\n    { name: '5 m (HF)', logLen: Math.log10(5) },\n    { name: '10 m (Shortwave)', logLen: 1 },\n    { name: '75 m (AM radio)', logLen: Math.log10(75) },\n    { name: '1 km (LF)', logLen: 3 },\n];\n\n// ======================== UTILITY ========================\nfunction formatFreq(f) {\n    if (f >= 1e15) return (f / 1e15).toFixed(1) + ' PHz';\n    if (f >= 1e12) return (f / 1e12).toFixed(1) + ' THz';\n    if (f >= 1e9) return (f / 1e9).toFixed(1) + ' GHz';\n    if (f >= 1e6) return (f / 1e6).toFixed(1) + ' MHz';\n    if (f >= 1e3) return (f / 1e3).toFixed(1) + ' kHz';\n    return f.toFixed(1) + ' Hz';\n}\n\nfunction formatLen(m) {\n    if (m >= 1e3) return (m / 1e3).toFixed(2) + ' km';\n    if (m >= 1) return m.toFixed(2) + ' m';\n    if (m >= 1e-2) return (m * 100).toFixed(1) + ' cm';\n    if (m >= 1e-3) return (m * 1e3).toFixed(2) + ' mm';\n    if (m >= 1e-6) return (m * 1e6).toFixed(1) + ' μm';\n    if (m >= 1e-9) return (m * 1e9).toFixed(1) + ' nm';\n    return m.toExponential(2) + ' m';\n}\n\nfunction getBand(freq) {\n    for (const b of EM_BANDS) {\n        if (freq >= b.fMin && freq < b.fMax) return b;\n    }\n    if (freq < EM_BANDS[0].fMin) return EM_BANDS[0];\n    return EM_BANDS[EM_BANDS.length - 1];\n}\n\n// Antenna efficiency model: sinc-like response around L/λ = 0.5\nfunction antennaEfficiency(L, freq) {\n    const lam = C / freq;\n    const ratio = L / lam;\n    // Model based on half-wave dipole response\n    // Peak at ratio = 0.5, with bandwidth and harmonic response\n    // Use a sum of resonance peaks at odd harmonics\n    let eff = 0;\n    for (let n = 1; n <= 15; n += 2) {\n        const peak = n * 0.5; // resonance at L/λ = n/2\n        const Q = 3 + n * 1.5; // Q-factor increases for higher harmonics\n        const delta = ratio - peak;\n        const resp = 1 / (1 + (2 * Q * delta) * (2 * Q * delta));\n        eff += resp / (n * 0.6); // higher harmonics contribute less\n    }\n    return Math.min(1, eff);\n}\n\n// ======================== CANVAS SETUP ========================\nfunction setupCanvas(id) {\n    const canvas = document.getElementById(id);\n    const rect = canvas.parentElement.getBoundingClientRect();\n    const w = rect.width;\n    const h = Math.min(w * 0.75, window.innerHeight - 160);\n    canvas.style.height = h + 'px';\n    canvas.width = w * DPR;\n    canvas.height = h * DPR;\n    const ctx = canvas.getContext('2d');\n    ctx.scale(DPR, DPR);\n    return { canvas, ctx, W: w, H: h };\n}\n\n// ======================== SLIDER SYNC ========================\nfunction getAntennaLength(tabIdx) {\n    const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];\n    const logVal = parseFloat(document.getElementById(ids[tabIdx]).value);\n    return Math.pow(10, logVal);\n}\n\nfunction syncAntennaSliders(sourceIdx) {\n    const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];\n    const valIds = ['antennaLenVal', 'antennaLen2Val', 'antennaLen3Val'];\n    const val = document.getElementById(ids[sourceIdx]).value;\n    ids.forEach((id, i) => {\n        document.getElementById(id).value = val;\n        document.getElementById(valIds[i]).textContent = formatLen(Math.pow(10, parseFloat(val)));\n    });\n}\n\n// ======================== HUMAN SILHOUETTE ========================\nconst HUMAN_HEIGHT = 1.75; // meters\n\nfunction drawHumanSilhouette(ctx, footX, footY, heightPx, alpha) {\n    // Abstract human silhouette drawn from foot position upward\n    // All proportions relative to total height\n    if (heightPx < 2) {\n        // Too tiny — just draw a dot\n        ctx.save();\n        ctx.fillStyle = 'rgba(180,160,200,' + Math.min(alpha, 0.8) + ')';\n        ctx.beginPath();\n        ctx.arc(footX, footY - 1, 1.5, 0, Math.PI * 2);\n        ctx.fill();\n        ctx.restore();\n        return;\n    }\n\n    const h = heightPx;\n    const headR = h * 0.09;\n    const neckY = footY - h * 0.87;\n    const headCY = footY - h * 0.93;\n    const shoulderY = footY - h * 0.78;\n    const shoulderW = h * 0.18;\n    const waistY = footY - h * 0.45;\n    const waistW = h * 0.10;\n    const hipY = footY - h * 0.40;\n    const hipW = h * 0.13;\n    const kneeY = footY - h * 0.22;\n    const legW = h * 0.05;\n    const footSpread = h * 0.08;\n\n    ctx.save();\n    ctx.globalAlpha = alpha;\n\n    // Body fill — a smooth silhouette path\n    ctx.fillStyle = 'rgba(160,145,190,0.5)';\n    ctx.strokeStyle = 'rgba(180,165,210,0.7)';\n    ctx.lineWidth = Math.max(1, h * 0.012);\n    ctx.lineJoin = 'round';\n\n    ctx.beginPath();\n\n    // Start from left foot, go up left side, over head, down right side, right foot\n    // Left foot\n    ctx.moveTo(footX - footSpread, footY);\n    // Left leg to knee\n    ctx.lineTo(footX - legW * 0.8, kneeY);\n    // Left leg to hip\n    ctx.lineTo(footX - hipW, hipY);\n    // Left waist\n    ctx.lineTo(footX - waistW, waistY);\n    // Left shoulder\n    ctx.lineTo(footX - shoulderW, shoulderY);\n    // Neck left\n    ctx.lineTo(footX - headR * 0.45, neckY);\n    // Head (arc over top)\n    ctx.arc(footX, headCY, headR, Math.PI * 0.85, Math.PI * 0.15, false);\n    // Neck right\n    ctx.lineTo(footX + headR * 0.45, neckY);\n    // Right shoulder\n    ctx.lineTo(footX + shoulderW, shoulderY);\n    // Right waist\n    ctx.lineTo(footX + waistW, waistY);\n    // Right hip\n    ctx.lineTo(footX + hipW, hipY);\n    // Right leg to knee\n    ctx.lineTo(footX + legW * 0.8, kneeY);\n    // Right foot\n    ctx.lineTo(footX + footSpread, footY);\n\n    ctx.closePath();\n    ctx.fill();\n    ctx.stroke();\n\n    ctx.restore();\n}\n\n// ======================== TAB 1: WAVE & ANTENNA ========================\nfunction renderTab1() {\n    const { ctx, W, H } = setupCanvas('c1');\n    const L = getAntennaLength(0);\n    const logFreq = parseFloat(document.getElementById('waveFreq').value);\n    const freq = Math.pow(10, logFreq);\n    const lam = C / freq;\n    const ratio = L / lam;\n    const eff = antennaEfficiency(L, freq);\n\n    // Update readouts\n    document.getElementById('waveFreqVal').textContent = formatFreq(freq);\n    document.getElementById('waveLenVal').textContent = formatLen(lam);\n    document.getElementById('ratioVal').textContent = ratio.toFixed(3);\n    const resFreq = C / (2 * L);\n    document.getElementById('resFreqVal').textContent = formatFreq(resFreq);\n    const band = getBand(resFreq);\n    document.getElementById('bandVal').textContent = band.name;\n\n    // Efficiency bar\n    const effPct = Math.round(eff * 100);\n    const effBar = document.getElementById('effBar');\n    effBar.style.width = effPct + '%';\n    effBar.style.background = eff > 0.7 ? '#6ecf6e' : eff > 0.3 ? '#e8c050' : '#e07050';\n    document.getElementById('effLabel').textContent = effPct + '%';\n\n    // ---- Drawing ----\n    const cx = W / 2;\n    const cy = H / 2;\n    const showWave = document.getElementById('togWave').checked;\n    const showCurrent = document.getElementById('togCurrent').checked;\n    const showEField = document.getElementById('togEField').checked;\n    const showLabels = document.getElementById('togLabels').checked;\n\n    // Scale: fit antenna in view with padding\n    const antennaPixels = Math.min(H * 0.6, 300);\n    const waveRegionWidth = W * 0.35;\n\n    // Draw background gradient showing wave propagation direction\n    const grad = ctx.createLinearGradient(0, 0, W, 0);\n    grad.addColorStop(0, 'rgba(30,50,80,0.15)');\n    grad.addColorStop(0.5, 'rgba(30,50,80,0)');\n    grad.addColorStop(1, 'rgba(30,50,80,0.15)');\n    ctx.fillStyle = grad;\n    ctx.fillRect(0, 0, W, H);\n\n    // Wave propagation arrow\n    if (showLabels) {\n        ctx.save();\n        ctx.fillStyle = 'rgba(120,150,200,0.4)';\n        ctx.font = '11px -apple-system, sans-serif';\n        ctx.textAlign = 'center';\n        ctx.fillText('← EM wave propagation direction', W * 0.22, 25);\n        ctx.fillText('Antenna (vertical dipole)', cx, 25);\n        ctx.restore();\n    }\n\n    // ---- Draw incoming EM wave ----\n    if (showWave) {\n        const waveScale = antennaPixels / L; // pixels per meter, capped\n        const pixelsPerLam = Math.min(Math.max(lam * waveScale, 20), waveRegionWidth);\n        const waveAmplitude = 40;\n        const phase = animTime * 4;\n\n        ctx.save();\n        // E-field wave (vertical oscillation)\n        ctx.strokeStyle = COL_WAVE;\n        ctx.lineWidth = 2;\n        ctx.globalAlpha = 0.8;\n        ctx.beginPath();\n        for (let px = 0; px < W * 0.4; px++) {\n            const x = W * 0.05 + px;\n            const wavePos = px / pixelsPerLam * 2 * Math.PI + phase;\n            const yOff = Math.sin(wavePos) * waveAmplitude;\n            if (px === 0) ctx.moveTo(x, cy + yOff);\n            else ctx.lineTo(x, cy + yOff);\n        }\n        ctx.stroke();\n        ctx.restore();\n\n        // Wavefront lines (vertical dashes moving right)\n        if (showEField) {\n            ctx.save();\n            ctx.strokeStyle = COL_EFIELD;\n            ctx.lineWidth = 1;\n            ctx.globalAlpha = 0.3;\n            ctx.setLineDash([4, 6]);\n            const numFronts = Math.ceil(W * 0.4 / pixelsPerLam) + 2;\n            for (let i = -1; i < numFronts; i++) {\n                const baseX = W * 0.05 + (i * pixelsPerLam) - ((phase / (2 * Math.PI)) % 1) * pixelsPerLam;\n                if (baseX > 0 && baseX < W * 0.45) {\n                    ctx.beginPath();\n                    ctx.moveTo(baseX, cy - 60);\n                    ctx.lineTo(baseX, cy + 60);\n                    ctx.stroke();\n                }\n            }\n            ctx.restore();\n        }\n\n        // Label wavelength\n        if (showLabels && pixelsPerLam > 30) {\n            ctx.save();\n            ctx.strokeStyle = 'rgba(126,184,218,0.6)';\n            ctx.lineWidth = 1;\n            const lx = W * 0.15;\n            const ly = cy - waveAmplitude - 15;\n            ctx.beginPath();\n            ctx.moveTo(lx, ly); ctx.lineTo(lx + pixelsPerLam, ly);\n            ctx.stroke();\n            // arrows\n            ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 5, ly - 3); ctx.lineTo(lx + 5, ly + 3); ctx.closePath(); ctx.fillStyle = 'rgba(126,184,218,0.6)'; ctx.fill();\n            ctx.beginPath(); ctx.moveTo(lx + pixelsPerLam, ly); ctx.lineTo(lx + pixelsPerLam - 5, ly - 3); ctx.lineTo(lx + pixelsPerLam - 5, ly + 3); ctx.closePath(); ctx.fill();\n            ctx.fillStyle = COL_WAVE;\n            ctx.font = '11px -apple-system, sans-serif';\n            ctx.textAlign = 'center';\n            ctx.fillText('λ = ' + formatLen(lam), lx + pixelsPerLam / 2, ly - 5);\n            ctx.restore();\n        }\n    }\n\n    // ---- Draw antenna ----\n    const antTop = cy - antennaPixels / 2;\n    const antBot = cy + antennaPixels / 2;\n\n    // Antenna body\n    ctx.save();\n    ctx.strokeStyle = COL_ANTENNA;\n    ctx.lineWidth = 4;\n    ctx.shadowColor = COL_ANTENNA;\n    ctx.shadowBlur = eff > 0.5 ? 12 * eff : 4;\n    ctx.beginPath();\n    ctx.moveTo(cx, antTop);\n    ctx.lineTo(cx, cy - 3);\n    ctx.stroke();\n    ctx.beginPath();\n    ctx.moveTo(cx, cy + 3);\n    ctx.lineTo(cx, antBot);\n    ctx.stroke();\n    ctx.restore();\n\n    // Feed point\n    ctx.save();\n    ctx.fillStyle = '#e8c050';\n    ctx.beginPath();\n    ctx.arc(cx, cy, 4, 0, Math.PI * 2);\n    ctx.fill();\n    ctx.restore();\n\n    // Antenna length label\n    if (showLabels) {\n        ctx.save();\n        ctx.strokeStyle = 'rgba(110,207,110,0.5)';\n        ctx.lineWidth = 1;\n        const lx = cx + 20;\n        ctx.beginPath(); ctx.moveTo(lx, antTop); ctx.lineTo(lx, antBot); ctx.stroke();\n        ctx.beginPath(); ctx.moveTo(lx - 4, antTop); ctx.lineTo(lx + 4, antTop); ctx.stroke();\n        ctx.beginPath(); ctx.moveTo(lx - 4, antBot); ctx.lineTo(lx + 4, antBot); ctx.stroke();\n        ctx.fillStyle = COL_ANTENNA;\n        ctx.font = '11px -apple-system, sans-serif';\n        ctx.textAlign = 'left';\n        ctx.fillText('L = ' + formatLen(L), lx + 8, cy + 4);\n        ctx.restore();\n    }\n\n    // ---- Human silhouette for scale ----\n    if (document.getElementById('togHuman').checked) {\n        const pxPerMeter = antennaPixels / L;\n        const rawPersonH = HUMAN_HEIGHT * pxPerMeter;\n        const maxPersonH = H * 0.85;\n        const personH = Math.min(rawPersonH, maxPersonH);\n        const isClamped = rawPersonH > maxPersonH;\n        const isTiny = rawPersonH < 8;\n\n        // Person stands at the bottom of the antenna\n        const personFootY = antBot;\n        const personX = cx - 55;\n\n        // Clip to canvas so oversized figure doesn't draw above top\n        ctx.save();\n        ctx.beginPath();\n        ctx.rect(0, 0, W, H);\n        ctx.clip();\n\n        if (personH > 0.5) {\n            drawHumanSilhouette(ctx, personX, personFootY, personH, isClamped ? 0.35 : 0.55);\n        }\n\n        // Draw a ground line at the foot\n        ctx.strokeStyle = 'rgba(180,165,210,0.2)';\n        ctx.lineWidth = 1;\n        ctx.beginPath();\n        ctx.moveTo(personX - 30, personFootY);\n        ctx.lineTo(cx - 10, personFootY);\n        ctx.stroke();\n\n        // Height label next to person\n        if (showLabels) {\n            ctx.fillStyle = 'rgba(180,165,210,0.7)';\n            ctx.font = '10px -apple-system, sans-serif';\n            ctx.textAlign = 'center';\n            if (isClamped) {\n                // Person is much bigger than antenna — show cropped with wavy cut line\n                const topY = personFootY - personH;\n                const cutY = Math.max(8, topY);\n                ctx.strokeStyle = 'rgba(180,165,210,0.5)';\n                ctx.lineWidth = 1.5;\n                ctx.setLineDash([4, 3]);\n                ctx.beginPath();\n                ctx.moveTo(personX - 22, cutY);\n                ctx.lineTo(personX + 22, cutY);\n                ctx.stroke();\n                ctx.setLineDash([]);\n                // Upward arrow to show person extends beyond\n                ctx.fillStyle = 'rgba(180,165,210,0.6)';\n                ctx.beginPath();\n                ctx.moveTo(personX, cutY - 1);\n                ctx.lineTo(personX - 5, cutY + 7);\n                ctx.lineTo(personX + 5, cutY + 7);\n                ctx.closePath();\n                ctx.fill();\n                ctx.fillStyle = 'rgba(180,165,210,0.7)';\n                ctx.font = '10px -apple-system, sans-serif';\n                ctx.textAlign = 'left';\n                ctx.fillText('1.75 m', personX + 10, cutY + 20);\n            } else if (isTiny) {\n                // Very tiny — add a callout arrow\n                ctx.fillStyle = 'rgba(180,165,210,0.6)';\n                ctx.textAlign = 'left';\n                ctx.fillText('← person (1.75 m)', personX + 8, personFootY - 2);\n            } else {\n                // Normal range — label with bracket\n                const topY = personFootY - personH;\n                ctx.strokeStyle = 'rgba(180,165,210,0.4)';\n                ctx.lineWidth = 1;\n                const bx = personX - Math.min(personH * 0.15, 18) - 5;\n                ctx.beginPath(); ctx.moveTo(bx, topY); ctx.lineTo(bx, personFootY); ctx.stroke();\n                ctx.beginPath(); ctx.moveTo(bx - 3, topY); ctx.lineTo(bx + 3, topY); ctx.stroke();\n                ctx.beginPath(); ctx.moveTo(bx - 3, personFootY); ctx.lineTo(bx + 3, personFootY); ctx.stroke();\n                ctx.textAlign = 'right';\n                ctx.fillText('1.75 m', bx - 5, (topY + personFootY) / 2 + 4);\n            }\n        }\n        ctx.restore();\n    }\n\n    // ---- Standing wave / current distribution on antenna ----\n    if (showCurrent) {\n        ctx.save();\n        const maxDisp = 25;\n        ctx.strokeStyle = COL_CURRENT;\n        ctx.lineWidth = 2;\n        ctx.globalAlpha = 0.8;\n\n        // Current distribution: sinusoidal pattern based on frequency\n        // At resonance, we see a half-wave pattern\n        const k = 2 * Math.PI / lam;\n        const halfL = L / 2;\n        const antScale = antennaPixels / L;\n        const timePhase = Math.sin(animTime * 4);\n\n        // Draw on both sides\n        ctx.beginPath();\n        const steps = 80;\n        for (let i = 0; i <= steps; i++) {\n            const frac = i / steps; // 0 to 1 along antenna\n            const posAlongAnt = (frac - 0.5) * L; // -L/2 to L/2\n            const yPx = cy - posAlongAnt * (antennaPixels / L);\n\n            // Current: sin(k * (L/2 - |pos|)) — standing wave with nodes at tips\n            const distFromEnd = halfL - Math.abs(posAlongAnt);\n            let current = Math.sin(k * distFromEnd) * timePhase;\n\n            const xDisp = current * maxDisp * Math.min(eff + 0.2, 1);\n            if (i === 0) ctx.moveTo(cx + xDisp, yPx);\n            else ctx.lineTo(cx + xDisp, yPx);\n        }\n        ctx.stroke();\n\n        // Mirror side\n        ctx.globalAlpha = 0.3;\n        ctx.beginPath();\n        for (let i = 0; i <= steps; i++) {\n            const frac = i / steps;\n            const posAlongAnt = (frac - 0.5) * L;\n            const yPx = cy - posAlongAnt * (antennaPixels / L);\n            const distFromEnd = halfL - Math.abs(posAlongAnt);\n            let current = Math.sin(k * distFromEnd) * timePhase;\n            const xDisp = -current * maxDisp * Math.min(eff + 0.2, 1);\n            if (i === 0) ctx.moveTo(cx + xDisp, yPx);\n            else ctx.lineTo(cx + xDisp, yPx);\n        }\n        ctx.stroke();\n        ctx.restore();\n    }\n\n    // ---- E-field arrows (re-radiated) ----\n    if (showEField) {\n        ctx.save();\n        const numArrows = 8;\n        const ringSpacing = 35;\n        for (let r = 1; r <= numArrows; r++) {\n            const radius = r * ringSpacing;\n            const phase = animTime * 4 - r * 0.8;\n            const strength = Math.sin(phase) * eff;\n            const alpha = Math.max(0, 0.5 - r * 0.05) * Math.abs(strength);\n\n            ctx.strokeStyle = COL_EFIELD;\n            ctx.globalAlpha = alpha;\n            ctx.lineWidth = 1.5;\n\n            // Draw arcs on right side of antenna\n            const startAngle = -Math.PI * 0.4;\n            const endAngle = Math.PI * 0.4;\n            ctx.beginPath();\n            ctx.arc(cx + W * 0.15, cy, radius, startAngle, endAngle);\n            ctx.stroke();\n        }\n        ctx.restore();\n    }\n\n    // ---- Ratio / resonance indicator ----\n    ctx.save();\n    ctx.fillStyle = 'rgba(20,20,40,0.85)';\n    const boxW = 200, boxH = 50;\n    const boxX = W - boxW - 15, boxY = H - boxH - 15;\n    ctx.beginPath();\n    ctx.roundRect(boxX, boxY, boxW, boxH, 8);\n    ctx.fill();\n    ctx.strokeStyle = 'rgba(60,60,100,0.5)';\n    ctx.lineWidth = 1;\n    ctx.stroke();\n\n    ctx.font = '600 14px SF Mono, monospace';\n    ctx.textAlign = 'center';\n    const ratioColor = eff > 0.7 ? COL_ANTENNA : eff > 0.3 ? COL_CURRENT : COL_EFIELD;\n    ctx.fillStyle = ratioColor;\n    ctx.fillText('L/λ = ' + ratio.toFixed(3), boxX + boxW / 2, boxY + 22);\n    ctx.font = '11px -apple-system, sans-serif';\n    ctx.fillStyle = '#8899aa';\n    ctx.fillText(eff > 0.7 ? 'Near resonance!' : eff > 0.3 ? 'Partial coupling' : 'Poor coupling', boxX + boxW / 2, boxY + 40);\n    ctx.restore();\n}\n\n// ======================== TAB 2: FREQUENCY RESPONSE ========================\nfunction renderTab2() {\n    const { ctx, W, H } = setupCanvas('c2');\n    const L = getAntennaLength(1);\n    const resFreq = C / (2 * L);\n    const resLam = 2 * L;\n\n    // Update readouts\n    document.getElementById('resFreq2').textContent = formatFreq(resFreq);\n    document.getElementById('resLam2').textContent = formatLen(resLam);\n    const band = getBand(resFreq);\n    document.getElementById('bandVal2').textContent = band.name;\n\n    const showBands = document.getElementById('togBandShading').checked;\n    const showHarmonics = document.getElementById('togHarmonics').checked;\n    const logScale = document.getElementById('togLogScale').checked;\n\n    // Plot area\n    const pad = { left: 65, right: 25, top: 40, bottom: 55 };\n    const plotW = W - pad.left - pad.right;\n    const plotH = H - pad.top - pad.bottom;\n\n    // Frequency range: center around resonant freq, span ~4 decades\n    const logResFreq = Math.log10(resFreq);\n    const logFMin = logScale ? logResFreq - 2 : Math.max(0, logResFreq - 1.5);\n    const logFMax = logScale ? logResFreq + 2 : logResFreq + 1.5;\n\n    function freqToX(f) {\n        if (logScale) {\n            const logF = Math.log10(f);\n            return pad.left + (logF - logFMin) / (logFMax - logFMin) * plotW;\n        } else {\n            return pad.left + (f - Math.pow(10, logFMin)) / (Math.pow(10, logFMax) - Math.pow(10, logFMin)) * plotW;\n        }\n    }\n\n    function xToFreq(x) {\n        const frac = (x - pad.left) / plotW;\n        if (logScale) {\n            return Math.pow(10, logFMin + frac * (logFMax - logFMin));\n        } else {\n            return Math.pow(10, logFMin) + frac * (Math.pow(10, logFMax) - Math.pow(10, logFMin));\n        }\n    }\n\n    // ---- Band shading ----\n    if (showBands) {\n        ctx.save();\n        for (const b of EM_BANDS) {\n            const x1 = freqToX(b.fMin);\n            const x2 = freqToX(b.fMax);\n            if (x2 < pad.left || x1 > W - pad.right) continue;\n            const clampX1 = Math.max(pad.left, x1);\n            const clampX2 = Math.min(W - pad.right, x2);\n            ctx.fillStyle = b.color;\n            ctx.globalAlpha = 0.08;\n            ctx.fillRect(clampX1, pad.top, clampX2 - clampX1, plotH);\n            // Band label\n            const midX = (clampX1 + clampX2) / 2;\n            if (clampX2 - clampX1 > 20) {\n                ctx.globalAlpha = 0.5;\n                ctx.fillStyle = b.color;\n                ctx.font = '9px -apple-system, sans-serif';\n                ctx.textAlign = 'center';\n                ctx.fillText(b.name, midX, pad.top + 12);\n            }\n        }\n        ctx.restore();\n    }\n\n    // ---- Grid ----\n    ctx.save();\n    ctx.strokeStyle = 'rgba(80,100,140,0.15)';\n    ctx.lineWidth = 0.5;\n    // Horizontal grid\n    for (let i = 0; i <= 10; i++) {\n        const y = pad.top + (i / 10) * plotH;\n        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();\n    }\n    // Vertical grid - frequency markers\n    const decades = logFMax - logFMin;\n    for (let d = Math.ceil(logFMin); d <= Math.floor(logFMax); d++) {\n        const x = freqToX(Math.pow(10, d));\n        if (x >= pad.left && x <= W - pad.right) {\n            ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();\n        }\n        // Sub-decade lines\n        for (let s = 2; s <= 9; s++) {\n            const xSub = freqToX(s * Math.pow(10, d));\n            if (xSub >= pad.left && xSub <= W - pad.right) {\n                ctx.globalAlpha = 0.5;\n                ctx.beginPath(); ctx.moveTo(xSub, pad.top); ctx.lineTo(xSub, pad.top + plotH); ctx.stroke();\n                ctx.globalAlpha = 1;\n            }\n        }\n    }\n    ctx.restore();\n\n    // ---- Plot efficiency curve ----\n    const numPoints = 500;\n    ctx.save();\n\n    // Fill under curve\n    ctx.beginPath();\n    ctx.moveTo(pad.left, pad.top + plotH);\n    for (let i = 0; i <= numPoints; i++) {\n        const x = pad.left + (i / numPoints) * plotW;\n        const f = xToFreq(x);\n        const eff = antennaEfficiency(L, f);\n        const y = pad.top + (1 - eff) * plotH;\n        ctx.lineTo(x, y);\n    }\n    ctx.lineTo(pad.left + plotW, pad.top + plotH);\n    ctx.closePath();\n    const fillGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);\n    fillGrad.addColorStop(0, 'rgba(110,207,110,0.25)');\n    fillGrad.addColorStop(1, 'rgba(110,207,110,0.02)');\n    ctx.fillStyle = fillGrad;\n    ctx.fill();\n\n    // Stroke curve\n    ctx.beginPath();\n    for (let i = 0; i <= numPoints; i++) {\n        const x = pad.left + (i / numPoints) * plotW;\n        const f = xToFreq(x);\n        const eff = antennaEfficiency(L, f);\n        const y = pad.top + (1 - eff) * plotH;\n        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n    }\n    ctx.strokeStyle = COL_ANTENNA;\n    ctx.lineWidth = 2.5;\n    ctx.stroke();\n    ctx.restore();\n\n    // ---- Harmonic markers ----\n    if (showHarmonics) {\n        ctx.save();\n        for (let n = 1; n <= 9; n += 2) {\n            const hFreq = n * resFreq;\n            const x = freqToX(hFreq);\n            if (x < pad.left || x > W - pad.right) continue;\n            ctx.strokeStyle = n === 1 ? COL_ANTENNA : COL_HARM;\n            ctx.lineWidth = n === 1 ? 2 : 1;\n            ctx.globalAlpha = n === 1 ? 0.8 : 0.5;\n            ctx.setLineDash(n === 1 ? [] : [4, 4]);\n            ctx.beginPath();\n            ctx.moveTo(x, pad.top);\n            ctx.lineTo(x, pad.top + plotH);\n            ctx.stroke();\n            // Label\n            ctx.setLineDash([]);\n            ctx.fillStyle = n === 1 ? COL_ANTENNA : COL_HARM;\n            ctx.font = '10px SF Mono, monospace';\n            ctx.textAlign = 'center';\n            ctx.globalAlpha = 1;\n            if (n === 1) {\n                ctx.fillText('f₀ = ' + formatFreq(hFreq), x, pad.top + plotH + 32);\n            } else {\n                ctx.fillText(n + 'f₀', x, pad.top + plotH + 32);\n            }\n        }\n        ctx.restore();\n    }\n\n    // -3 dB line\n    ctx.save();\n    ctx.strokeStyle = COL_CURRENT;\n    ctx.lineWidth = 1;\n    ctx.setLineDash([6, 4]);\n    ctx.globalAlpha = 0.6;\n    const halfPowerY = pad.top + 0.5 * plotH;\n    ctx.beginPath();\n    ctx.moveTo(pad.left, halfPowerY);\n    ctx.lineTo(W - pad.right, halfPowerY);\n    ctx.stroke();\n    ctx.setLineDash([]);\n    ctx.fillStyle = COL_CURRENT;\n    ctx.font = '10px -apple-system, sans-serif';\n    ctx.textAlign = 'right';\n    ctx.fillText('-3 dB (50%)', pad.left - 5, halfPowerY + 4);\n    ctx.restore();\n\n    // Find -3dB bandwidth\n    let fLow = resFreq, fHigh = resFreq;\n    for (let f = resFreq; f > resFreq * 0.01; f *= 0.99) {\n        if (antennaEfficiency(L, f) < 0.5) { fLow = f; break; }\n    }\n    for (let f = resFreq; f < resFreq * 100; f *= 1.01) {\n        if (antennaEfficiency(L, f) < 0.5) { fHigh = f; break; }\n    }\n    document.getElementById('usableRange2').textContent = formatFreq(fLow) + ' – ' + formatFreq(fHigh);\n\n    // Shade -3dB bandwidth\n    ctx.save();\n    const bwX1 = Math.max(pad.left, freqToX(fLow));\n    const bwX2 = Math.min(W - pad.right, freqToX(fHigh));\n    ctx.fillStyle = 'rgba(232,192,80,0.08)';\n    ctx.fillRect(bwX1, pad.top, bwX2 - bwX1, plotH);\n    ctx.restore();\n\n    // ---- Axes ----\n    ctx.save();\n    ctx.strokeStyle = 'rgba(120,150,200,0.5)';\n    ctx.lineWidth = 1;\n    // X axis\n    ctx.beginPath();\n    ctx.moveTo(pad.left, pad.top + plotH);\n    ctx.lineTo(W - pad.right, pad.top + plotH);\n    ctx.stroke();\n    // Y axis\n    ctx.beginPath();\n    ctx.moveTo(pad.left, pad.top);\n    ctx.lineTo(pad.left, pad.top + plotH);\n    ctx.stroke();\n\n    // X labels\n    ctx.fillStyle = 'rgba(120,150,200,0.7)';\n    ctx.font = '10px SF Mono, monospace';\n    ctx.textAlign = 'center';\n    for (let d = Math.ceil(logFMin); d <= Math.floor(logFMax); d++) {\n        const x = freqToX(Math.pow(10, d));\n        if (x >= pad.left && x <= W - pad.right) {\n            ctx.fillText(formatFreq(Math.pow(10, d)), x, pad.top + plotH + 15);\n        }\n    }\n    ctx.font = '11px -apple-system, sans-serif';\n    ctx.fillText('Frequency', pad.left + plotW / 2, pad.top + plotH + 48);\n\n    // Y labels\n    ctx.textAlign = 'right';\n    ctx.font = '10px SF Mono, monospace';\n    for (let i = 0; i <= 10; i += 2) {\n        const y = pad.top + (1 - i / 10) * plotH;\n        ctx.fillText((i * 10) + '%', pad.left - 8, y + 4);\n    }\n    ctx.save();\n    ctx.translate(15, pad.top + plotH / 2);\n    ctx.rotate(-Math.PI / 2);\n    ctx.textAlign = 'center';\n    ctx.font = '11px -apple-system, sans-serif';\n    ctx.fillText('Efficiency', 0, 0);\n    ctx.restore();\n    ctx.restore();\n\n    // Title\n    ctx.save();\n    ctx.fillStyle = '#c8d8e8';\n    ctx.font = '600 14px -apple-system, sans-serif';\n    ctx.textAlign = 'center';\n    ctx.fillText('Frequency Response — L = ' + formatLen(L), W / 2, 25);\n    ctx.restore();\n}\n\n// ======================== TAB 3: EM SPECTRUM EXPLORER ========================\nfunction renderTab3() {\n    const { ctx, W, H } = setupCanvas('c3');\n    const L = getAntennaLength(2);\n    const resFreq = C / (2 * L);\n    const resLam = 2 * L;\n\n    // Update readouts\n    document.getElementById('resFreq3').textContent = formatFreq(resFreq);\n    document.getElementById('resLam3').textContent = formatLen(resLam);\n    const band = getBand(resFreq);\n    document.getElementById('bandVal3').textContent = band.name;\n    document.getElementById('appVal3').textContent = band.apps;\n\n    const showScale = document.getElementById('togAntennaScale').checked;\n    const showCompare = document.getElementById('togCompare').checked;\n\n    const pad = { left: 50, right: 30, top: 80, bottom: 70 };\n    const plotW = W - pad.left - pad.right;\n    const plotH = H - pad.top - pad.bottom;\n\n    // Full spectrum range: 1 Hz to 1 PHz\n    const logFMin = 0;\n    const logFMax = 16;\n\n    function freqToX(f) {\n        return pad.left + (Math.log10(f) - logFMin) / (logFMax - logFMin) * plotW;\n    }\n\n    // ---- Band bars ----\n    const bandBarY = pad.top;\n    const bandBarH = 35;\n\n    for (const b of EM_BANDS) {\n        const x1 = Math.max(pad.left, freqToX(b.fMin));\n        const x2 = Math.min(W - pad.right, freqToX(b.fMax));\n        if (x2 < pad.left || x1 > W - pad.right) continue;\n\n        ctx.save();\n        ctx.fillStyle = b.color;\n        ctx.globalAlpha = 0.3;\n        ctx.fillRect(x1, bandBarY, x2 - x1, bandBarH);\n        ctx.globalAlpha = 0.6;\n        ctx.fillRect(x1, bandBarY, x2 - x1, 3);\n        ctx.restore();\n\n        // Label\n        const midX = (x1 + x2) / 2;\n        if (x2 - x1 > 15) {\n            ctx.save();\n            ctx.fillStyle = b.color;\n            ctx.globalAlpha = 0.9;\n            ctx.font = '600 10px -apple-system, sans-serif';\n            ctx.textAlign = 'center';\n            ctx.fillText(b.name, midX, bandBarY + 22);\n            ctx.restore();\n        }\n    }\n\n    // ---- Wavelength scale (secondary axis) ----\n    const lamAxisY = pad.top + bandBarH + 10;\n    ctx.save();\n    ctx.strokeStyle = 'rgba(120,150,200,0.3)';\n    ctx.lineWidth = 0.5;\n    ctx.fillStyle = 'rgba(120,150,200,0.5)';\n    ctx.font = '9px SF Mono, monospace';\n    ctx.textAlign = 'center';\n\n    // wavelength = c/f, so logLam = log(c) - logF\n    const lamMarkers = [-12, -9, -6, -3, 0, 3, 6, 8]; // log10 of wavelength in meters\n    const lamLabels = ['pm', 'nm', 'μm', 'mm', 'm', 'km', 'Mm', '100Mm'];\n    lamMarkers.forEach((logLam, i) => {\n        const f = C / Math.pow(10, logLam);\n        const x = freqToX(f);\n        if (x >= pad.left && x <= W - pad.right) {\n            ctx.beginPath();\n            ctx.moveTo(x, lamAxisY);\n            ctx.lineTo(x, lamAxisY + 6);\n            ctx.stroke();\n            ctx.fillText('1 ' + lamLabels[i], x, lamAxisY + 16);\n        }\n    });\n    ctx.textAlign = 'center';\n    ctx.font = '10px -apple-system, sans-serif';\n    ctx.fillText('Wavelength', pad.left + plotW / 2, lamAxisY + 28);\n    ctx.restore();\n\n    // ---- Efficiency curve across full spectrum ----\n    const curveY = lamAxisY + 38;\n    const curveH = H - curveY - pad.bottom;\n\n    // Grid\n    ctx.save();\n    ctx.strokeStyle = 'rgba(80,100,140,0.12)';\n    ctx.lineWidth = 0.5;\n    for (let i = 0; i <= 10; i++) {\n        const y = curveY + (i / 10) * curveH;\n        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();\n    }\n    ctx.restore();\n\n    // Plot\n    const numPoints = 600;\n    ctx.save();\n    ctx.beginPath();\n    ctx.moveTo(pad.left, curveY + curveH);\n    for (let i = 0; i <= numPoints; i++) {\n        const logF = logFMin + (i / numPoints) * (logFMax - logFMin);\n        const f = Math.pow(10, logF);\n        const eff = antennaEfficiency(L, f);\n        const x = pad.left + (i / numPoints) * plotW;\n        const y = curveY + (1 - eff) * curveH;\n        ctx.lineTo(x, y);\n    }\n    ctx.lineTo(pad.left + plotW, curveY + curveH);\n    ctx.closePath();\n    const fillGrad = ctx.createLinearGradient(0, curveY, 0, curveY + curveH);\n    fillGrad.addColorStop(0, 'rgba(110,207,110,0.2)');\n    fillGrad.addColorStop(1, 'rgba(110,207,110,0.01)');\n    ctx.fillStyle = fillGrad;\n    ctx.fill();\n\n    ctx.beginPath();\n    for (let i = 0; i <= numPoints; i++) {\n        const logF = logFMin + (i / numPoints) * (logFMax - logFMin);\n        const f = Math.pow(10, logF);\n        const eff = antennaEfficiency(L, f);\n        const x = pad.left + (i / numPoints) * plotW;\n        const y = curveY + (1 - eff) * curveH;\n        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n    }\n    ctx.strokeStyle = COL_ANTENNA;\n    ctx.lineWidth = 2;\n    ctx.stroke();\n    ctx.restore();\n\n    // Resonance marker\n    ctx.save();\n    const resX = freqToX(resFreq);\n    if (resX >= pad.left && resX <= W - pad.right) {\n        ctx.strokeStyle = COL_CURRENT;\n        ctx.lineWidth = 2;\n        ctx.setLineDash([]);\n        ctx.beginPath();\n        ctx.moveTo(resX, bandBarY);\n        ctx.lineTo(resX, curveY + curveH);\n        ctx.stroke();\n\n        // Glow\n        ctx.shadowColor = COL_CURRENT;\n        ctx.shadowBlur = 10;\n        ctx.beginPath();\n        ctx.moveTo(resX, bandBarY);\n        ctx.lineTo(resX, curveY + curveH);\n        ctx.stroke();\n        ctx.shadowBlur = 0;\n\n        // Label\n        ctx.fillStyle = COL_CURRENT;\n        ctx.font = '600 11px SF Mono, monospace';\n        ctx.textAlign = 'center';\n        ctx.fillText('f₀ = ' + formatFreq(resFreq), resX, curveY + curveH + 16);\n        ctx.fillText('λ = ' + formatLen(resLam), resX, curveY + curveH + 30);\n    }\n    ctx.restore();\n\n    // ---- Frequency axis ----\n    ctx.save();\n    ctx.strokeStyle = 'rgba(120,150,200,0.5)';\n    ctx.lineWidth = 1;\n    ctx.beginPath();\n    ctx.moveTo(pad.left, curveY + curveH);\n    ctx.lineTo(W - pad.right, curveY + curveH);\n    ctx.stroke();\n\n    ctx.fillStyle = 'rgba(120,150,200,0.6)';\n    ctx.font = '9px SF Mono, monospace';\n    ctx.textAlign = 'center';\n    for (let d = 1; d <= 15; d += 1) {\n        const x = freqToX(Math.pow(10, d));\n        if (x >= pad.left && x <= W - pad.right) {\n            ctx.beginPath();\n            ctx.moveTo(x, curveY + curveH);\n            ctx.lineTo(x, curveY + curveH + 5);\n            ctx.stroke();\n            if (d % 2 === 0 || (d < 6 || d > 13)) {\n                ctx.fillText(formatFreq(Math.pow(10, d)), x, curveY + curveH + 48);\n            }\n        }\n    }\n    ctx.font = '10px -apple-system, sans-serif';\n    ctx.fillText('Frequency', pad.left + plotW / 2, curveY + curveH + 62);\n    ctx.restore();\n\n    // Y axis labels\n    ctx.save();\n    ctx.fillStyle = 'rgba(120,150,200,0.5)';\n    ctx.font = '9px SF Mono, monospace';\n    ctx.textAlign = 'right';\n    for (let i = 0; i <= 10; i += 2) {\n        const y = curveY + (1 - i / 10) * curveH;\n        ctx.fillText((i * 10) + '%', pad.left - 6, y + 3);\n    }\n    ctx.restore();\n\n    // ---- Antenna size comparison (if enabled) ----\n    if (showCompare) {\n        const compAntennas = [\n            { name: 'Cell (15cm)', len: 0.15, color: '#ff6666' },\n            { name: 'FM (1.5m)', len: 1.5, color: '#66ff66' },\n            { name: 'AM (75m)', len: 75, color: '#6666ff' },\n        ];\n        ctx.save();\n        compAntennas.forEach((a, idx) => {\n            const f0 = C / (2 * a.len);\n            const x = freqToX(f0);\n            if (x >= pad.left && x <= W - pad.right) {\n                ctx.strokeStyle = a.color;\n                ctx.lineWidth = 1;\n                ctx.globalAlpha = 0.5;\n                ctx.setLineDash([3, 3]);\n                ctx.beginPath();\n                ctx.moveTo(x, bandBarY);\n                ctx.lineTo(x, curveY + curveH);\n                ctx.stroke();\n                ctx.setLineDash([]);\n                ctx.globalAlpha = 0.8;\n                ctx.fillStyle = a.color;\n                ctx.font = '9px -apple-system, sans-serif';\n                ctx.textAlign = 'left';\n                ctx.fillText(a.name, x + 4, bandBarY + bandBarH + 42 + idx * 12);\n            }\n        });\n        ctx.restore();\n    }\n\n    // ---- Antenna to-scale illustration ----\n    if (showScale) {\n        const iconX = W - 80;\n        const iconY = curveY + 10;\n        const maxIconH = curveH - 30;\n        // Show antenna scaled relative to some reference\n        const iconH = Math.min(maxIconH, Math.max(10, maxIconH * 0.5));\n\n        ctx.save();\n        ctx.strokeStyle = COL_ANTENNA;\n        ctx.lineWidth = 3;\n        ctx.shadowColor = COL_ANTENNA;\n        ctx.shadowBlur = 8;\n        ctx.beginPath();\n        ctx.moveTo(iconX, iconY + (maxIconH - iconH) / 2);\n        ctx.lineTo(iconX, iconY + (maxIconH + iconH) / 2);\n        ctx.stroke();\n\n        ctx.shadowBlur = 0;\n        ctx.fillStyle = COL_ANTENNA;\n        ctx.font = '10px -apple-system, sans-serif';\n        ctx.textAlign = 'center';\n        ctx.fillText(formatLen(L), iconX, iconY + (maxIconH + iconH) / 2 + 15);\n        ctx.fillText('Antenna', iconX, iconY + (maxIconH - iconH) / 2 - 8);\n        ctx.restore();\n    }\n\n    // Title\n    ctx.save();\n    ctx.fillStyle = '#c8d8e8';\n    ctx.font = '600 14px -apple-system, sans-serif';\n    ctx.textAlign = 'center';\n    ctx.fillText('EM Spectrum — Antenna L = ' + formatLen(L), W / 2, 25);\n    ctx.font = '11px -apple-system, sans-serif';\n    ctx.fillStyle = '#667';\n    ctx.fillText('Resonant band: ' + band.name + ' — ' + band.apps, W / 2, 50);\n    ctx.restore();\n}\n\n// ======================== CHIP BUILDERS ========================\nfunction buildAntennaChips(containerId, tabIdx) {\n    const el = document.getElementById(containerId);\n    el.innerHTML = '';\n    ANTENNA_PRESETS.forEach(p => {\n        const chip = document.createElement('span');\n        chip.className = 'chip';\n        chip.textContent = p.name;\n        chip.onclick = () => {\n            const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];\n            document.getElementById(ids[tabIdx]).value = p.logLen;\n            syncAntennaSliders(tabIdx);\n            render();\n        };\n        el.appendChild(chip);\n    });\n}\n\nfunction buildBandLegend() {\n    const el = document.getElementById('bandLegend');\n    el.innerHTML = '';\n    EM_BANDS.forEach(b => {\n        const item = document.createElement('span');\n        item.className = 'band-item';\n        item.innerHTML = `<span class=\"band-swatch\" style=\"background:${b.color}\"><\/span>${b.name}`;\n        el.appendChild(item);\n    });\n}\n\n// ======================== RENDER DISPATCH ========================\nfunction render() {\n    if (activeTab === 0) renderTab1();\n    else if (activeTab === 1) renderTab2();\n    else if (activeTab === 2) renderTab3();\n}\n\n// ======================== TABS ========================\nfunction switchTab(idx) {\n    activeTab = idx;\n    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));\n    document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));\n    render();\n}\n\n// ======================== ANIMATION LOOP ========================\nfunction animLoop(ts) {\n    animTime = ts / 1000;\n    if (activeTab === 0) render();\n    animRAF = requestAnimationFrame(animLoop);\n}\n\n// ======================== EVENT LISTENERS ========================\n['antennaLen', 'antennaLen2', 'antennaLen3'].forEach((id, idx) => {\n    document.getElementById(id).addEventListener('input', () => {\n        syncAntennaSliders(idx);\n        render();\n    });\n});\n\ndocument.getElementById('waveFreq').addEventListener('input', render);\n\n['togWave', 'togCurrent', 'togEField', 'togLabels', 'togHuman',\n 'togBandShading', 'togHarmonics', 'togLogScale',\n 'togAntennaScale', 'togCompare'].forEach(id => {\n    document.getElementById(id).addEventListener('change', render);\n});\n\n// ======================== INIT ========================\nfunction init() {\n    buildAntennaChips('antennaChips', 0);\n    buildAntennaChips('antennaChips2', 1);\n    buildAntennaChips('antennaChips3', 2);\n    buildBandLegend();\n    syncAntennaSliders(0);\n    render();\n    animRAF = requestAnimationFrame(animLoop);\n\n    // KaTeX rendering\n    if (typeof renderMathInElement !== 'undefined') {\n        renderMathInElement(document.body, {\n            delimiters: [\n                { left: '$$', right: '$$', display: true },\n                { left: '$', right: '$', display: false },\n            ]\n        });\n    }\n}\n\nwindow.addEventListener('resize', render);\nwindow.addEventListener('load', init);\n<\/script>\n<\/body>\n<\/html>\n","__sim_name":"antenna.html","__cits":[]}</script>
