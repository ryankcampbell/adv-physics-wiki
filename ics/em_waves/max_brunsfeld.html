// ======================== UTILITY ========================
function formatFreq(f) {
    if (f >= 1e15) return (f / 1e15).toFixed(1) + ' PHz';
    if (f >= 1e12) return (f / 1e12).toFixed(1) + ' THz';
    if (f >= 1e9) return (f / 1e9).toFixed(1) + ' GHz';
    if (f >= 1e6) return (f / 1e6).toFixed(1) + ' MHz';
    if (f >= 1e3) return (f / 1e3).toFixed(1) + ' kHz';
    return f.toFixed(1) + ' Hz';
}

function formatLen(m) {
    if (m >= 1e3) return (m / 1e3).toFixed(2) + ' km';
    if (m >= 1) return m.toFixed(2) + ' m';
    if (m >= 1e-2) return (m * 100).toFixed(1) + ' cm';
    if (m >= 1e-3) return (m * 1e3).toFixed(2) + ' mm';
    if (m >= 1e-6) return (m * 1e6).toFixed(1) + ' μm';
    if (m >= 1e-9) return (m * 1e9).toFixed(1) + ' nm';
    return m.toExponential(2) + ' m';
}

function getBand(freq) {
    for (const b of EM_BANDS) {
        if (freq >= b.fMin &amp;&amp; freq < b.fMax) return b;
    }
    if (freq < EM_BANDS[0].fMin) return EM_BANDS[0];
    return EM_BANDS[EM_BANDS.length - 1];
}

// Antenna efficiency model: sinc-like response around L/λ = 0.5
function antennaEfficiency(L, freq) {
    const lam = C / freq;
    const ratio = L / lam;
    // Model based on half-wave dipole response
    // Peak at ratio = 0.5, with bandwidth and harmonic response
    // Use a sum of resonance peaks at odd harmonics
    let eff = 0;
    for (let n = 1; n <= 15; n += 2) {
        const peak = n * 0.5; // resonance at L/λ = n/2
        const Q = 3 + n * 1.5; // Q-factor increases for higher harmonics
        const delta = ratio - peak;
        const resp = 1 / (1 + (2 * Q * delta) * (2 * Q * delta));
        eff += resp / (n * 0.6); // higher harmonics contribute less
    }
    return Math.min(1, eff);
}

// ======================== CANVAS SETUP ========================
function setupCanvas(id) {
    const canvas = document.getElementById(id);
    const rect = canvas.parentElement.getBoundingClientRect();
    const w = rect.width;
    const h = Math.min(w * 0.75, window.innerHeight - 160);
    canvas.style.height = h + 'px';
    canvas.width = w * DPR;
    canvas.height = h * DPR;
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);
    return { canvas, ctx, W: w, H: h };
}

// ======================== SLIDER SYNC ========================
function getAntennaLength(tabIdx) {
    const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];
    const logVal = parseFloat(document.getElementById(ids[tabIdx]).value);
    return Math.pow(10, logVal);
}

function syncAntennaSliders(sourceIdx) {
    const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];
    const valIds = ['antennaLenVal', 'antennaLen2Val', 'antennaLen3Val'];
    const val = document.getElementById(ids[sourceIdx]).value;
    ids.forEach((id, i) => {
        document.getElementById(id).value = val;
        document.getElementById(valIds[i]).textContent = formatLen(Math.pow(10, parseFloat(val)));
    });
}

// ======================== HUMAN SILHOUETTE ========================
const HUMAN_HEIGHT = 1.75; // meters

function drawHumanSilhouette(ctx, footX, footY, heightPx, alpha) {
    // Abstract human silhouette drawn from foot position upward
    // All proportions relative to total height
    if (heightPx < 2) {
        // Too tiny — just draw a dot
        ctx.save();
        ctx.fillStyle = 'rgba(180,160,200,' + Math.min(alpha, 0.8) + ')';
        ctx.beginPath();
        ctx.arc(footX, footY - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
    }

    const h = heightPx;
    const headR = h * 0.09;
    const neckY = footY - h * 0.87;
    const headCY = footY - h * 0.93;
    const shoulderY = footY - h * 0.78;
    const shoulderW = h * 0.18;
    const waistY = footY - h * 0.45;
    const waistW = h * 0.10;
    const hipY = footY - h * 0.40;
    const hipW = h * 0.13;
    const kneeY = footY - h * 0.22;
    const legW = h * 0.05;
    const footSpread = h * 0.08;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Body fill — a smooth silhouette path
    ctx.fillStyle = 'rgba(160,145,190,0.5)';
    ctx.strokeStyle = 'rgba(180,165,210,0.7)';
    ctx.lineWidth = Math.max(1, h * 0.012);
    ctx.lineJoin = 'round';

    ctx.beginPath();

    // Start from left foot, go up left side, over head, down right side, right foot
    // Left foot
    ctx.moveTo(footX - footSpread, footY);
    // Left leg to knee
    ctx.lineTo(footX - legW * 0.8, kneeY);
    // Left leg to hip
    ctx.lineTo(footX - hipW, hipY);
    // Left waist
    ctx.lineTo(footX - waistW, waistY);
    // Left shoulder
    ctx.lineTo(footX - shoulderW, shoulderY);
    // Neck left
    ctx.lineTo(footX - headR * 0.45, neckY);
    // Head (arc over top)
    ctx.arc(footX, headCY, headR, Math.PI * 0.85, Math.PI * 0.15, false);
    // Neck right
    ctx.lineTo(footX + headR * 0.45, neckY);
    // Right shoulder
    ctx.lineTo(footX + shoulderW, shoulderY);
    // Right waist
    ctx.lineTo(footX + waistW, waistY);
    // Right hip
    ctx.lineTo(footX + hipW, hipY);
    // Right leg to knee
    ctx.lineTo(footX + legW * 0.8, kneeY);
    // Right foot
    ctx.lineTo(footX + footSpread, footY);

    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

// ======================== TAB 1: WAVE &amp; ANTENNA ========================
function renderTab1() {
    const { ctx, W, H } = setupCanvas('c1');
    const L = getAntennaLength(0);
    const logFreq = parseFloat(document.getElementById('waveFreq').value);
    const freq = Math.pow(10, logFreq);
    const lam = C / freq;
    const ratio = L / lam;
    const eff = antennaEfficiency(L, freq);

    // Update readouts
    document.getElementById('waveFreqVal').textContent = formatFreq(freq);
    document.getElementById('waveLenVal').textContent = formatLen(lam);
    document.getElementById('ratioVal').textContent = ratio.toFixed(3);
    const resFreq = C / (2 * L);
    document.getElementById('resFreqVal').textContent = formatFreq(resFreq);
    const band = getBand(resFreq);
    document.getElementById('bandVal').textContent = band.name;

    // Efficiency bar
    const effPct = Math.round(eff * 100);
    const effBar = document.getElementById('effBar');
    effBar.style.width = effPct + '%';
    effBar.style.background = eff > 0.7 ? '#6ecf6e' : eff > 0.3 ? '#e8c050' : '#e07050';
    document.getElementById('effLabel').textContent = effPct + '%';

    // ---- Drawing ----
    const cx = W / 2;
    const cy = H / 2;
    const showWave = document.getElementById('togWave').checked;
    const showCurrent = document.getElementById('togCurrent').checked;
    const showEField = document.getElementById('togEField').checked;
    const showLabels = document.getElementById('togLabels').checked;

    // Scale: fit antenna in view with padding
    const antennaPixels = Math.min(H * 0.6, 300);
    const waveRegionWidth = W * 0.35;

    // Draw background gradient showing wave propagation direction
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'rgba(30,50,80,0.15)');
    grad.addColorStop(0.5, 'rgba(30,50,80,0)');
    grad.addColorStop(1, 'rgba(30,50,80,0.15)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Wave propagation arrow
    if (showLabels) {
        ctx.save();
        ctx.fillStyle = 'rgba(120,150,200,0.4)';
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('← EM wave propagation direction', W * 0.22, 25);
        ctx.fillText('Antenna (vertical dipole)', cx, 25);
        ctx.restore();
    }

    // ---- Draw incoming EM wave ----
    if (showWave) {
        const waveScale = antennaPixels / L; // pixels per meter, capped
        const pixelsPerLam = Math.min(Math.max(lam * waveScale, 20), waveRegionWidth);
        const waveAmplitude = 40;
        const phase = animTime * 4;

        ctx.save();
        // E-field wave (vertical oscillation)
        ctx.strokeStyle = COL_WAVE;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        for (let px = 0; px < W * 0.4; px++) {
            const x = W * 0.05 + px;
            const wavePos = px / pixelsPerLam * 2 * Math.PI + phase;
            const yOff = Math.sin(wavePos) * waveAmplitude;
            if (px === 0) ctx.moveTo(x, cy + yOff);
            else ctx.lineTo(x, cy + yOff);
        }
        ctx.stroke();
        ctx.restore();

        // Wavefront lines (vertical dashes moving right)
        if (showEField) {
            ctx.save();
            ctx.strokeStyle = COL_EFIELD;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.3;
            ctx.setLineDash([4, 6]);
            const numFronts = Math.ceil(W * 0.4 / pixelsPerLam) + 2;
            for (let i = -1; i < numFronts; i++) {
                const baseX = W * 0.05 + (i * pixelsPerLam) - ((phase / (2 * Math.PI)) % 1) * pixelsPerLam;
                if (baseX > 0 &amp;&amp; baseX < W * 0.45) {
                    ctx.beginPath();
                    ctx.moveTo(baseX, cy - 60);
                    ctx.lineTo(baseX, cy + 60);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // Label wavelength
        if (showLabels &amp;&amp; pixelsPerLam > 30) {
            ctx.save();
            ctx.strokeStyle = 'rgba(126,184,218,0.6)';
            ctx.lineWidth = 1;
            const lx = W * 0.15;
            const ly = cy - waveAmplitude - 15;
            ctx.beginPath();
            ctx.moveTo(lx, ly); ctx.lineTo(lx + pixelsPerLam, ly);
            ctx.stroke();
            // arrows
            ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 5, ly - 3); ctx.lineTo(lx + 5, ly + 3); ctx.closePath(); ctx.fillStyle = 'rgba(126,184,218,0.6)'; ctx.fill();
            ctx.beginPath(); ctx.moveTo(lx + pixelsPerLam, ly); ctx.lineTo(lx + pixelsPerLam - 5, ly - 3); ctx.lineTo(lx + pixelsPerLam - 5, ly + 3); ctx.closePath(); ctx.fill();
            ctx.fillStyle = COL_WAVE;
            ctx.font = '11px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('λ = ' + formatLen(lam), lx + pixelsPerLam / 2, ly - 5);
            ctx.restore();
        }
    }

    // ---- Draw antenna ----
    const antTop = cy - antennaPixels / 2;
    const antBot = cy + antennaPixels / 2;

    // Antenna body
    ctx.save();
    ctx.strokeStyle = COL_ANTENNA;
    ctx.lineWidth = 4;
    ctx.shadowColor = COL_ANTENNA;
    ctx.shadowBlur = eff > 0.5 ? 12 * eff : 4;
    ctx.beginPath();
    ctx.moveTo(cx, antTop);
    ctx.lineTo(cx, cy - 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy + 3);
    ctx.lineTo(cx, antBot);
    ctx.stroke();
    ctx.restore();

    // Feed point
    ctx.save();
    ctx.fillStyle = '#e8c050';
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Antenna length label
    if (showLabels) {
        ctx.save();
        ctx.strokeStyle = 'rgba(110,207,110,0.5)';
        ctx.lineWidth = 1;
        const lx = cx + 20;
        ctx.beginPath(); ctx.moveTo(lx, antTop); ctx.lineTo(lx, antBot); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(lx - 4, antTop); ctx.lineTo(lx + 4, antTop); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(lx - 4, antBot); ctx.lineTo(lx + 4, antBot); ctx.stroke();
        ctx.fillStyle = COL_ANTENNA;
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('L = ' + formatLen(L), lx + 8, cy + 4);
        ctx.restore();
    }

    // ---- Human silhouette for scale ----
    if (document.getElementById('togHuman').checked) {
        const pxPerMeter = antennaPixels / L;
        const rawPersonH = HUMAN_HEIGHT * pxPerMeter;
        const maxPersonH = H * 0.85;
        const personH = Math.min(rawPersonH, maxPersonH);
        const isClamped = rawPersonH > maxPersonH;
        const isTiny = rawPersonH < 8;

        // Person stands at the bottom of the antenna
        const personFootY = antBot;
        const personX = cx - 55;

        // Clip to canvas so oversized figure doesn't draw above top
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, W, H);
        ctx.clip();

        if (personH > 0.5) {
            drawHumanSilhouette(ctx, personX, personFootY, personH, isClamped ? 0.35 : 0.55);
        }

        // Draw a ground line at the foot
        ctx.strokeStyle = 'rgba(180,165,210,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(personX - 30, personFootY);
        ctx.lineTo(cx - 10, personFootY);
        ctx.stroke();

        // Height label next to person
        if (showLabels) {
            ctx.fillStyle = 'rgba(180,165,210,0.7)';
            ctx.font = '10px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            if (isClamped) {
                // Person is much bigger than antenna — show cropped with wavy cut line
                const topY = personFootY - personH;
                const cutY = Math.max(8, topY);
                ctx.strokeStyle = 'rgba(180,165,210,0.5)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(personX - 22, cutY);
                ctx.lineTo(personX + 22, cutY);
                ctx.stroke();
                ctx.setLineDash([]);
                // Upward arrow to show person extends beyond
                ctx.fillStyle = 'rgba(180,165,210,0.6)';
                ctx.beginPath();
                ctx.moveTo(personX, cutY - 1);
                ctx.lineTo(personX - 5, cutY + 7);
                ctx.lineTo(personX + 5, cutY + 7);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(180,165,210,0.7)';
                ctx.font = '10px -apple-system, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('1.75 m', personX + 10, cutY + 20);
            } else if (isTiny) {
                // Very tiny — add a callout arrow
                ctx.fillStyle = 'rgba(180,165,210,0.6)';
                ctx.textAlign = 'left';
                ctx.fillText('← person (1.75 m)', personX + 8, personFootY - 2);
            } else {
                // Normal range — label with bracket
                const topY = personFootY - personH;
                ctx.strokeStyle = 'rgba(180,165,210,0.4)';
                ctx.lineWidth = 1;
                const bx = personX - Math.min(personH * 0.15, 18) - 5;
                ctx.beginPath(); ctx.moveTo(bx, topY); ctx.lineTo(bx, personFootY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(bx - 3, topY); ctx.lineTo(bx + 3, topY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(bx - 3, personFootY); ctx.lineTo(bx + 3, personFootY); ctx.stroke();
                ctx.textAlign = 'right';
                ctx.fillText('1.75 m', bx - 5, (topY + personFootY) / 2 + 4);
            }
        }
        ctx.restore();
    }

    // ---- Standing wave / current distribution on antenna ----
    if (showCurrent) {
        ctx.save();
        const maxDisp = 25;
        ctx.strokeStyle = COL_CURRENT;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;

        // Current distribution: sinusoidal pattern based on frequency
        // At resonance, we see a half-wave pattern
        const k = 2 * Math.PI / lam;
        const halfL = L / 2;
        const antScale = antennaPixels / L;
        const timePhase = Math.sin(animTime * 4);

        // Draw on both sides
        ctx.beginPath();
        const steps = 80;
        for (let i = 0; i <= steps; i++) {
            const frac = i / steps; // 0 to 1 along antenna
            const posAlongAnt = (frac - 0.5) * L; // -L/2 to L/2
            const yPx = cy - posAlongAnt * (antennaPixels / L);

            // Current: sin(k * (L/2 - |pos|)) — standing wave with nodes at tips
            const distFromEnd = halfL - Math.abs(posAlongAnt);
            let current = Math.sin(k * distFromEnd) * timePhase;

            const xDisp = current * maxDisp * Math.min(eff + 0.2, 1);
            if (i === 0) ctx.moveTo(cx + xDisp, yPx);
            else ctx.lineTo(cx + xDisp, yPx);
        }
        ctx.stroke();

        // Mirror side
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const frac = i / steps;
            const posAlongAnt = (frac - 0.5) * L;
            const yPx = cy - posAlongAnt * (antennaPixels / L);
            const distFromEnd = halfL - Math.abs(posAlongAnt);
            let current = Math.sin(k * distFromEnd) * timePhase;
            const xDisp = -current * maxDisp * Math.min(eff + 0.2, 1);
            if (i === 0) ctx.moveTo(cx + xDisp, yPx);
            else ctx.lineTo(cx + xDisp, yPx);
        }
        ctx.stroke();
        ctx.restore();
    }

    // ---- E-field arrows (re-radiated) ----
    if (showEField) {
        ctx.save();
        const numArrows = 8;
        const ringSpacing = 35;
        for (let r = 1; r <= numArrows; r++) {
            const radius = r * ringSpacing;
            const phase = animTime * 4 - r * 0.8;
            const strength = Math.sin(phase) * eff;
            const alpha = Math.max(0, 0.5 - r * 0.05) * Math.abs(strength);

            ctx.strokeStyle = COL_EFIELD;
            ctx.globalAlpha = alpha;
            ctx.lineWidth = 1.5;

            // Draw arcs on right side of antenna
            const startAngle = -Math.PI * 0.4;
            const endAngle = Math.PI * 0.4;
            ctx.beginPath();
            ctx.arc(cx + W * 0.15, cy, radius, startAngle, endAngle);
            ctx.stroke();
        }
        ctx.restore();
    }

    // ---- Ratio / resonance indicator ----
    ctx.save();
    ctx.fillStyle = 'rgba(20,20,40,0.85)';
    const boxW = 200, boxH = 50;
    const boxX = W - boxW - 15, boxY = H - boxH - 15;
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxW, boxH, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(60,60,100,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = '600 14px SF Mono, monospace';
    ctx.textAlign = 'center';
    const ratioColor = eff > 0.7 ? COL_ANTENNA : eff > 0.3 ? COL_CURRENT : COL_EFIELD;
    ctx.fillStyle = ratioColor;
    ctx.fillText('L/λ = ' + ratio.toFixed(3), boxX + boxW / 2, boxY + 22);
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = '#8899aa';
    ctx.fillText(eff > 0.7 ? 'Near resonance!' : eff > 0.3 ? 'Partial coupling' : 'Poor coupling', boxX + boxW / 2, boxY + 40);
    ctx.restore();
}

// ======================== TAB 2: FREQUENCY RESPONSE ========================
function renderTab2() {
    const { ctx, W, H } = setupCanvas('c2');
    const L = getAntennaLength(1);
    const resFreq = C / (2 * L);
    const resLam = 2 * L;

    // Update readouts
    document.getElementById('resFreq2').textContent = formatFreq(resFreq);
    document.getElementById('resLam2').textContent = formatLen(resLam);
    const band = getBand(resFreq);
    document.getElementById('bandVal2').textContent = band.name;

    const showBands = document.getElementById('togBandShading').checked;
    const showHarmonics = document.getElementById('togHarmonics').checked;
    const logScale = document.getElementById('togLogScale').checked;

    // Plot area
    const pad = { left: 65, right: 25, top: 40, bottom: 55 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Frequency range: center around resonant freq, span ~4 decades
    const logResFreq = Math.log10(resFreq);
    const logFMin = logScale ? logResFreq - 2 : Math.max(0, logResFreq - 1.5);
    const logFMax = logScale ? logResFreq + 2 : logResFreq + 1.5;

    function freqToX(f) {
        if (logScale) {
            const logF = Math.log10(f);
            return pad.left + (logF - logFMin) / (logFMax - logFMin) * plotW;
        } else {
            return pad.left + (f - Math.pow(10, logFMin)) / (Math.pow(10, logFMax) - Math.pow(10, logFMin)) * plotW;
        }
    }

    function xToFreq(x) {
        const frac = (x - pad.left) / plotW;
        if (logScale) {
            return Math.pow(10, logFMin + frac * (logFMax - logFMin));
        } else {
            return Math.pow(10, logFMin) + frac * (Math.pow(10, logFMax) - Math.pow(10, logFMin));
        }
    }

    // ---- Band shading ----
    if (showBands) {
        ctx.save();
        for (const b of EM_BANDS) {
            const x1 = freqToX(b.fMin);
            const x2 = freqToX(b.fMax);
            if (x2 < pad.left || x1 > W - pad.right) continue;
            const clampX1 = Math.max(pad.left, x1);
            const clampX2 = Math.min(W - pad.right, x2);
            ctx.fillStyle = b.color;
            ctx.globalAlpha = 0.08;
            ctx.fillRect(clampX1, pad.top, clampX2 - clampX1, plotH);
            // Band label
            const midX = (clampX1 + clampX2) / 2;
            if (clampX2 - clampX1 > 20) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = b.color;
                ctx.font = '9px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(b.name, midX, pad.top + 12);
            }
        }
        ctx.restore();
    }

    // ---- Grid ----
    ctx.save();
    ctx.strokeStyle = 'rgba(80,100,140,0.15)';
    ctx.lineWidth = 0.5;
    // Horizontal grid
    for (let i = 0; i <= 10; i++) {
        const y = pad.top + (i / 10) * plotH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    }
    // Vertical grid - frequency markers
    const decades = logFMax - logFMin;
    for (let d = Math.ceil(logFMin); d <= Math.floor(logFMax); d++) {
        const x = freqToX(Math.pow(10, d));
        if (x >= pad.left &amp;&amp; x <= W - pad.right) {
            ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotH); ctx.stroke();
        }
        // Sub-decade lines
        for (let s = 2; s <= 9; s++) {
            const xSub = freqToX(s * Math.pow(10, d));
            if (xSub >= pad.left &amp;&amp; xSub <= W - pad.right) {
                ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.moveTo(xSub, pad.top); ctx.lineTo(xSub, pad.top + plotH); ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
    }
    ctx.restore();

    // ---- Plot efficiency curve ----
    const numPoints = 500;
    ctx.save();

    // Fill under curve
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top + plotH);
    for (let i = 0; i <= numPoints; i++) {
        const x = pad.left + (i / numPoints) * plotW;
        const f = xToFreq(x);
        const eff = antennaEfficiency(L, f);
        const y = pad.top + (1 - eff) * plotH;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(pad.left + plotW, pad.top + plotH);
    ctx.closePath();
    const fillGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
    fillGrad.addColorStop(0, 'rgba(110,207,110,0.25)');
    fillGrad.addColorStop(1, 'rgba(110,207,110,0.02)');
    ctx.fillStyle = fillGrad;
    ctx.fill();

    // Stroke curve
    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
        const x = pad.left + (i / numPoints) * plotW;
        const f = xToFreq(x);
        const eff = antennaEfficiency(L, f);
        const y = pad.top + (1 - eff) * plotH;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = COL_ANTENNA;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();

    // ---- Harmonic markers ----
    if (showHarmonics) {
        ctx.save();
        for (let n = 1; n <= 9; n += 2) {
            const hFreq = n * resFreq;
            const x = freqToX(hFreq);
            if (x < pad.left || x > W - pad.right) continue;
            ctx.strokeStyle = n === 1 ? COL_ANTENNA : COL_HARM;
            ctx.lineWidth = n === 1 ? 2 : 1;
            ctx.globalAlpha = n === 1 ? 0.8 : 0.5;
            ctx.setLineDash(n === 1 ? [] : [4, 4]);
            ctx.beginPath();
            ctx.moveTo(x, pad.top);
            ctx.lineTo(x, pad.top + plotH);
            ctx.stroke();
            // Label
            ctx.setLineDash([]);
            ctx.fillStyle = n === 1 ? COL_ANTENNA : COL_HARM;
            ctx.font = '10px SF Mono, monospace';
            ctx.textAlign = 'center';
            ctx.globalAlpha = 1;
            if (n === 1) {
                ctx.fillText('f₀ = ' + formatFreq(hFreq), x, pad.top + plotH + 32);
            } else {
                ctx.fillText(n + 'f₀', x, pad.top + plotH + 32);
            }
        }
        ctx.restore();
    }

    // -3 dB line
    ctx.save();
    ctx.strokeStyle = COL_CURRENT;
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.globalAlpha = 0.6;
    const halfPowerY = pad.top + 0.5 * plotH;
    ctx.beginPath();
    ctx.moveTo(pad.left, halfPowerY);
    ctx.lineTo(W - pad.right, halfPowerY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = COL_CURRENT;
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('-3 dB (50%)', pad.left - 5, halfPowerY + 4);
    ctx.restore();

    // Find -3dB bandwidth
    let fLow = resFreq, fHigh = resFreq;
    for (let f = resFreq; f > resFreq * 0.01; f *= 0.99) {
        if (antennaEfficiency(L, f) < 0.5) { fLow = f; break; }
    }
    for (let f = resFreq; f < resFreq * 100; f *= 1.01) {
        if (antennaEfficiency(L, f) < 0.5) { fHigh = f; break; }
    }
    document.getElementById('usableRange2').textContent = formatFreq(fLow) + ' – ' + formatFreq(fHigh);

    // Shade -3dB bandwidth
    ctx.save();
    const bwX1 = Math.max(pad.left, freqToX(fLow));
    const bwX2 = Math.min(W - pad.right, freqToX(fHigh));
    ctx.fillStyle = 'rgba(232,192,80,0.08)';
    ctx.fillRect(bwX1, pad.top, bwX2 - bwX1, plotH);
    ctx.restore();

    // ---- Axes ----
    ctx.save();
    ctx.strokeStyle = 'rgba(120,150,200,0.5)';
    ctx.lineWidth = 1;
    // X axis
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top + plotH);
    ctx.lineTo(W - pad.right, pad.top + plotH);
    ctx.stroke();
    // Y axis
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + plotH);
    ctx.stroke();

    // X labels
    ctx.fillStyle = 'rgba(120,150,200,0.7)';
    ctx.font = '10px SF Mono, monospace';
    ctx.textAlign = 'center';
    for (let d = Math.ceil(logFMin); d <= Math.floor(logFMax); d++) {
        const x = freqToX(Math.pow(10, d));
        if (x >= pad.left &amp;&amp; x <= W - pad.right) {
            ctx.fillText(formatFreq(Math.pow(10, d)), x, pad.top + plotH + 15);
        }
    }
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText('Frequency', pad.left + plotW / 2, pad.top + plotH + 48);

    // Y labels
    ctx.textAlign = 'right';
    ctx.font = '10px SF Mono, monospace';
    for (let i = 0; i <= 10; i += 2) {
        const y = pad.top + (1 - i / 10) * plotH;
        ctx.fillText((i * 10) + '%', pad.left - 8, y + 4);
    }
    ctx.save();
    ctx.translate(15, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText('Efficiency', 0, 0);
    ctx.restore();
    ctx.restore();

    // Title
    ctx.save();
    ctx.fillStyle = '#c8d8e8';
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Frequency Response — L = ' + formatLen(L), W / 2, 25);
    ctx.restore();
}

// ======================== TAB 3: EM SPECTRUM EXPLORER ========================
function renderTab3() {
    const { ctx, W, H } = setupCanvas('c3');
    const L = getAntennaLength(2);
    const resFreq = C / (2 * L);
    const resLam = 2 * L;

    // Update readouts
    document.getElementById('resFreq3').textContent = formatFreq(resFreq);
    document.getElementById('resLam3').textContent = formatLen(resLam);
    const band = getBand(resFreq);
    document.getElementById('bandVal3').textContent = band.name;
    document.getElementById('appVal3').textContent = band.apps;

    const showScale = document.getElementById('togAntennaScale').checked;
    const showCompare = document.getElementById('togCompare').checked;

    const pad = { left: 50, right: 30, top: 80, bottom: 70 };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Full spectrum range: 1 Hz to 1 PHz
    const logFMin = 0;
    const logFMax = 16;

    function freqToX(f) {
        return pad.left + (Math.log10(f) - logFMin) / (logFMax - logFMin) * plotW;
    }

    // ---- Band bars ----
    const bandBarY = pad.top;
    const bandBarH = 35;

    for (const b of EM_BANDS) {
        const x1 = Math.max(pad.left, freqToX(b.fMin));
        const x2 = Math.min(W - pad.right, freqToX(b.fMax));
        if (x2 < pad.left || x1 > W - pad.right) continue;

        ctx.save();
        ctx.fillStyle = b.color;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(x1, bandBarY, x2 - x1, bandBarH);
        ctx.globalAlpha = 0.6;
        ctx.fillRect(x1, bandBarY, x2 - x1, 3);
        ctx.restore();

        // Label
        const midX = (x1 + x2) / 2;
        if (x2 - x1 > 15) {
            ctx.save();
            ctx.fillStyle = b.color;
            ctx.globalAlpha = 0.9;
            ctx.font = '600 10px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(b.name, midX, bandBarY + 22);
            ctx.restore();
        }
    }

    // ---- Wavelength scale (secondary axis) ----
    const lamAxisY = pad.top + bandBarH + 10;
    ctx.save();
    ctx.strokeStyle = 'rgba(120,150,200,0.3)';
    ctx.lineWidth = 0.5;
    ctx.fillStyle = 'rgba(120,150,200,0.5)';
    ctx.font = '9px SF Mono, monospace';
    ctx.textAlign = 'center';

    // wavelength = c/f, so logLam = log(c) - logF
    const lamMarkers = [-12, -9, -6, -3, 0, 3, 6, 8]; // log10 of wavelength in meters
    const lamLabels = ['pm', 'nm', 'μm', 'mm', 'm', 'km', 'Mm', '100Mm'];
    lamMarkers.forEach((logLam, i) => {
        const f = C / Math.pow(10, logLam);
        const x = freqToX(f);
        if (x >= pad.left &amp;&amp; x <= W - pad.right) {
            ctx.beginPath();
            ctx.moveTo(x, lamAxisY);
            ctx.lineTo(x, lamAxisY + 6);
            ctx.stroke();
            ctx.fillText('1 ' + lamLabels[i], x, lamAxisY + 16);
        }
    });
    ctx.textAlign = 'center';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText('Wavelength', pad.left + plotW / 2, lamAxisY + 28);
    ctx.restore();

    // ---- Efficiency curve across full spectrum ----
    const curveY = lamAxisY + 38;
    const curveH = H - curveY - pad.bottom;

    // Grid
    ctx.save();
    ctx.strokeStyle = 'rgba(80,100,140,0.12)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 10; i++) {
        const y = curveY + (i / 10) * curveH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    }
    ctx.restore();

    // Plot
    const numPoints = 600;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pad.left, curveY + curveH);
    for (let i = 0; i <= numPoints; i++) {
        const logF = logFMin + (i / numPoints) * (logFMax - logFMin);
        const f = Math.pow(10, logF);
        const eff = antennaEfficiency(L, f);
        const x = pad.left + (i / numPoints) * plotW;
        const y = curveY + (1 - eff) * curveH;
        ctx.lineTo(x, y);
    }
    ctx.lineTo(pad.left + plotW, curveY + curveH);
    ctx.closePath();
    const fillGrad = ctx.createLinearGradient(0, curveY, 0, curveY + curveH);
    fillGrad.addColorStop(0, 'rgba(110,207,110,0.2)');
    fillGrad.addColorStop(1, 'rgba(110,207,110,0.01)');
    ctx.fillStyle = fillGrad;
    ctx.fill();

    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
        const logF = logFMin + (i / numPoints) * (logFMax - logFMin);
        const f = Math.pow(10, logF);
        const eff = antennaEfficiency(L, f);
        const x = pad.left + (i / numPoints) * plotW;
        const y = curveY + (1 - eff) * curveH;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = COL_ANTENNA;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Resonance marker
    ctx.save();
    const resX = freqToX(resFreq);
    if (resX >= pad.left &amp;&amp; resX <= W - pad.right) {
        ctx.strokeStyle = COL_CURRENT;
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(resX, bandBarY);
        ctx.lineTo(resX, curveY + curveH);
        ctx.stroke();

        // Glow
        ctx.shadowColor = COL_CURRENT;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(resX, bandBarY);
        ctx.lineTo(resX, curveY + curveH);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Label
        ctx.fillStyle = COL_CURRENT;
        ctx.font = '600 11px SF Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('f₀ = ' + formatFreq(resFreq), resX, curveY + curveH + 16);
        ctx.fillText('λ = ' + formatLen(resLam), resX, curveY + curveH + 30);
    }
    ctx.restore();

    // ---- Frequency axis ----
    ctx.save();
    ctx.strokeStyle = 'rgba(120,150,200,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, curveY + curveH);
    ctx.lineTo(W - pad.right, curveY + curveH);
    ctx.stroke();

    ctx.fillStyle = 'rgba(120,150,200,0.6)';
    ctx.font = '9px SF Mono, monospace';
    ctx.textAlign = 'center';
    for (let d = 1; d <= 15; d += 1) {
        const x = freqToX(Math.pow(10, d));
        if (x >= pad.left &amp;&amp; x <= W - pad.right) {
            ctx.beginPath();
            ctx.moveTo(x, curveY + curveH);
            ctx.lineTo(x, curveY + curveH + 5);
            ctx.stroke();
            if (d % 2 === 0 || (d < 6 || d > 13)) {
                ctx.fillText(formatFreq(Math.pow(10, d)), x, curveY + curveH + 48);
            }
        }
    }
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText('Frequency', pad.left + plotW / 2, curveY + curveH + 62);
    ctx.restore();

    // Y axis labels
    ctx.save();
    ctx.fillStyle = 'rgba(120,150,200,0.5)';
    ctx.font = '9px SF Mono, monospace';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 10; i += 2) {
        const y = curveY + (1 - i / 10) * curveH;
        ctx.fillText((i * 10) + '%', pad.left - 6, y + 3);
    }
    ctx.restore();

    // ---- Antenna size comparison (if enabled) ----
    if (showCompare) {
        const compAntennas = [
            { name: 'Cell (15cm)', len: 0.15, color: '#ff6666' },
            { name: 'FM (1.5m)', len: 1.5, color: '#66ff66' },
            { name: 'AM (75m)', len: 75, color: '#6666ff' },
        ];
        ctx.save();
        compAntennas.forEach((a, idx) => {
            const f0 = C / (2 * a.len);
            const x = freqToX(f0);
            if (x >= pad.left &amp;&amp; x <= W - pad.right) {
                ctx.strokeStyle = a.color;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.5;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(x, bandBarY);
                ctx.lineTo(x, curveY + curveH);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = a.color;
                ctx.font = '9px -apple-system, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(a.name, x + 4, bandBarY + bandBarH + 42 + idx * 12);
            }
        });
        ctx.restore();
    }

    // ---- Antenna to-scale illustration ----
    if (showScale) {
        const iconX = W - 80;
        const iconY = curveY + 10;
        const maxIconH = curveH - 30;
        // Show antenna scaled relative to some reference
        const iconH = Math.min(maxIconH, Math.max(10, maxIconH * 0.5));

        ctx.save();
        ctx.strokeStyle = COL_ANTENNA;
        ctx.lineWidth = 3;
        ctx.shadowColor = COL_ANTENNA;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(iconX, iconY + (maxIconH - iconH) / 2);
        ctx.lineTo(iconX, iconY + (maxIconH + iconH) / 2);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = COL_ANTENNA;
        ctx.font = '10px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(formatLen(L), iconX, iconY + (maxIconH + iconH) / 2 + 15);
        ctx.fillText('Antenna', iconX, iconY + (maxIconH - iconH) / 2 - 8);
        ctx.restore();
    }

    // Title
    ctx.save();
    ctx.fillStyle = '#c8d8e8';
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('EM Spectrum — Antenna L = ' + formatLen(L), W / 2, 25);
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = '#667';
    ctx.fillText('Resonant band: ' + band.name + ' — ' + band.apps, W / 2, 50);
    ctx.restore();
}

// ======================== CHIP BUILDERS ========================
function buildAntennaChips(containerId, tabIdx) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    ANTENNA_PRESETS.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = p.name;
        chip.onclick = () => {
            const ids = ['antennaLen', 'antennaLen2', 'antennaLen3'];
            document.getElementById(ids[tabIdx]).value = p.logLen;
            syncAntennaSliders(tabIdx);
            render();
        };
        el.appendChild(chip);
    });
}

function buildBandLegend() {
    const el = document.getElementById('bandLegend');
    el.innerHTML = '';
    EM_BANDS.forEach(b => {
        const item = document.createElement('span');
        item.className = 'band-item';
        item.innerHTML = `<span class=&quot;band-swatch&quot; style=&quot;background:${b.color}&quot;></span>${b.name}`;
        el.appendChild(item);
    });
}

// ======================== RENDER DISPATCH ========================
function render() {
    if (activeTab === 0) renderTab1();
    else if (activeTab === 1) renderTab2();
    else if (activeTab === 2) renderTab3();
}

// ======================== TABS ========================
function switchTab(idx) {
    activeTab = idx;
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
    render();
}

// ======================== ANIMATION LOOP ========================
function animLoop(ts) {
    animTime = ts / 1000;
    if (activeTab === 0) render();
    animRAF = requestAnimationFrame(animLoop);
}

// ======================== EVENT LISTENERS ========================
['antennaLen', 'antennaLen2', 'antennaLen3'].forEach((id, idx) => {
    document.getElementById(id).addEventListener('input', () => {
        syncAntennaSliders(idx);
        render();
    });
});

document.getElementById('waveFreq').addEventListener('input', render);

['togWave', 'togCurrent', 'togEField', 'togLabels', 'togHuman',
 'togBandShading', 'togHarmonics', 'togLogScale',
 'togAntennaScale', 'togCompare'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
});

// ======================== INIT ========================
function init() {
    buildAntennaChips('antennaChips', 0);
    buildAntennaChips('antennaChips2', 1);
    buildAntennaChips('antennaChips3', 2);
    buildBandLegend();
    syncAntennaSliders(0);
    render();
    animRAF = requestAnimationFrame(animLoop);

    // KaTeX rendering
    if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.body, {
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
            ]
        });
    }
}

window.addEventListener('resize', render);
window.addEventListener('load', init);
</script>
