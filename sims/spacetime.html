function drawIntervalLine() {
    const i1 = S.selectedEvIdx, i2 = S.selectedEvIdx2;
    if (i1 < 0 || i2 < 0 || i1 >= S.events.length || i2 >= S.events.length) return;
    const e1 = S.events[i1], e2 = S.events[i2];
    const s1 = worldToScreen(e1.x, e1.t), s2 = worldToScreen(e2.x, e2.t);

    const dt = e2.t - e1.t, dx = e2.x - e1.x;
    const ds2 = dt * dt - dx * dx;
    const type = ds2 > 1e-9 ? 'timelike' : (ds2 < -1e-9 ? 'spacelike' : 'lightlike');
    const lineColor = type === 'timelike' ? '#4ecdc4' : (type === 'spacelike' ? '#ff5555' : '#ffd700');

    ctx.save();
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = lineColor;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.lineTo(s2.x, s2.y);
    ctx.stroke();
    ctx.restore();

    // Label at midpoint
    const mx = (s1.x + s2.x) / 2, my = (s1.y + s2.y) / 2;
    ctx.fillStyle = lineColor;
    ctx.font = '600 11px SF Mono, Fira Code, monospace';
    ctx.textAlign = 'center';
    const label = `Δs²=${fmtNum(ds2)}`;
    ctx.fillText(label, mx, my - 8);
}

function updateIntervalPanel() {
    const panel = document.getElementById('intervalPanel');
    const info = document.getElementById('intervalInfo');
    const i1 = S.selectedEvIdx, i2 = S.selectedEvIdx2;
    if (i1 < 0 || i2 < 0 || i1 >= S.events.length || i2 >= S.events.length) {
        panel.style.display = 'none';
        return;
    }
    panel.style.display = 'block';
    const e1 = S.events[i1], e2 = S.events[i2];
    const dt = e2.t - e1.t, dx = e2.x - e1.x;
    const ds2 = dt * dt - dx * dx;
    const type = ds2 > 1e-9 ? 'timelike' : (ds2 < -1e-9 ? 'spacelike' : 'lightlike');
    const typeColor = type === 'timelike' ? '#4ecdc4' : (type === 'spacelike' ? '#ff5555' : '#ffd700');

    let html = `<div style="text-align:left;line-height:1.8;">`;
    html += `E${subscript(e1.id)} → E${subscript(e2.id)}<br>`;
    html += `Δt = ${fmtNum(e2.t)} − ${fmtNum(e1.t)} = <b>${fmtNum(dt)}</b><br>`;
    html += `Δx = ${fmtNum(e2.x)} − ${fmtNum(e1.x)} = <b>${fmtNum(dx)}</b><br>`;
    html += `Δs² = Δt² − Δx² = ${fmtNum(dt * dt)} − ${fmtNum(dx * dx)} = <b style="color:${typeColor}">${fmtNum(ds2)}</b><br>`;
    html += `<span style="color:${typeColor}">${type}</span>`;
    if (type === 'timelike') {
        html += ` · Δτ = √(Δs²) = <b>${fmtNum(Math.sqrt(ds2))}</b>`;
    } else if (type === 'spacelike') {
        html += ` · Δℓ = √(−Δs²) = <b>${fmtNum(Math.sqrt(-ds2))}</b>`;
    }

    // Show in primed frame too
    if (S.observer.active && Math.abs(S.observer.beta) > 1e-9) {
        const p1 = lorentz(e1.t, e1.x, S.observer.beta, S.observer.x0);
        const p2 = lorentz(e2.t, e2.x, S.observer.beta, S.observer.x0);
        const dtp = p2.t - p1.t, dxp = p2.x - p1.x;
        const ds2p = dtp * dtp - dxp * dxp;
        html += `<br><span style="color:${PRIMED_COLOR}">S′: Δt′=${fmtNum(dtp)} Δx′=${fmtNum(dxp)}</span>`;
        html += `<br><span style="color:${PRIMED_COLOR}">Δs²=${fmtNum(ds2p)}</span> (invariant ✓)`;
    }
    html += `</div>`;
    info.innerHTML = html;
}

function updateEventList() {
    const list = document.getElementById('evList');
    const hasObs = S.observer.active && Math.abs(S.observer.beta) > 1e-9;
    let html = '';
    S.events.forEach((ev, idx) => {
        let info = `E${subscript(ev.id)}: (${fmtNum(ev.x)}, ${fmtNum(ev.t)})`;
        if (hasObs) {
            const p = lorentz(ev.t, ev.x, S.observer.beta, S.observer.x0);
            info += ` → (${fmtNum(p.x)}, ${fmtNum(p.t)})′`;
        }
        const sel = (idx === S.selectedEvIdx || idx === S.selectedEvIdx2) ? 'border:1px solid #ffd700;' : '';
        html += `<div class="ev-item" style="${sel}" onclick="selectEvent(${idx}, event.shiftKey)">
            <div class="wl-color" style="background:${EVENT_COLOR}"></div>
            <div class="ev-info">${info}</div>
            <button class="ev-btn delete" onclick="event.stopPropagation();deleteEvent(${idx})">✕</button>
        </div>`;
    });
    list.innerHTML = html;
}

function updateObserverInfo() {
    const el = document.getElementById('observerInfo');
    if (S.observer.active) {
        const b = S.observer.beta;
        const g = S.observer.gamma;
        el.style.display = 'block';
        el.innerHTML = `β = ${fmtNum(b)}<br>γ = ${fmtNum(g)}<br>x₀ = ${fmtNum(S.observer.x0)}`;
    } else {
        el.style.display = 'none';
    }
}

// =================== OBSERVER MANAGEMENT =========================
function setObserver(beta, x0, fromWL) {
    if (Math.abs(beta) >= 1) return;
    S.observer.beta = beta;
    S.observer.x0 = x0;
    S.observer.gamma = 1 / Math.sqrt(1 - beta * beta);
    S.observer.active = true;
    S.observer.fromWL = fromWL !== undefined ? fromWL : -1;
    updateObserverInfo();
    updateWorldlineList();
    updateEventList();
    render();
}

function setObserverFromWL(idx) {
    const wl = S.worldlines[idx];
    if (!wl || wl.points.length !== 2) return;
    const dt = wl.points[1].t - wl.points[0].t;
    const dx = wl.points[1].x - wl.points[0].x;
    if (Math.abs(dt) < 1e-12) return;
    const beta = dx / dt;
    if (Math.abs(beta) >= 1) return;
    // x0: where worldline crosses t=0
    const x0 = wl.points[0].x - beta * wl.points[0].t;
    document.getElementById('betaSlider').value = beta;
    document.getElementById('betaVal').textContent = beta.toFixed(3);
    document.getElementById('x0Slider').value = x0;
    document.getElementById('x0Val').textContent = x0.toFixed(2);
    setObserver(beta, x0, idx);
}

function clearObserver() {
    S.observer.active = false;
    S.observer.fromWL = -1;
    updateObserverInfo();
    updateWorldlineList();
    updateEventList();
    render();
}

// ================== WORLDLINE MANAGEMENT =========================
function startNewWorldline() {
    S.worldlines.push({ points: [] });
    S.currentWL = S.worldlines.length - 1;
    updateWorldlineList();
}

function deleteWorldline(idx) {
    if (S.observer.fromWL === idx) clearObserver();
    else if (S.observer.fromWL > idx) S.observer.fromWL--;
    S.worldlines.splice(idx, 1);
    if (S.currentWL >= S.worldlines.length) S.currentWL = S.worldlines.length - 1;
    updateWorldlineList();
    render();
}

// =================== EVENT MANAGEMENT ============================
function addEvent(x, t) {
    S.events.push({ x, t, id: S.nextEventId++ });
    S.selectedEvIdx = S.events.length - 1;
    updateEventList();
    render();
}

function deleteEvent(idx) {
    S.events.splice(idx, 1);
    if (S.selectedEvIdx === idx) S.selectedEvIdx = -1;
    else if (S.selectedEvIdx > idx) S.selectedEvIdx--;
    if (S.selectedEvIdx2 === idx) S.selectedEvIdx2 = -1;
    else if (S.selectedEvIdx2 > idx) S.selectedEvIdx2--;
    S.hoveredEvIdx = -1;
    updateEventList();
    updateIntervalPanel();
    render();
}

function selectEvent(idx, shiftKey) {
    if (shiftKey && S.selectedEvIdx >= 0 && S.selectedEvIdx !== idx) {
        // Shift+click: select pair for interval
        S.selectedEvIdx2 = idx;
    } else {
        // Normal click: select/deselect, clear pair
        S.selectedEvIdx = (S.selectedEvIdx === idx) ? -1 : idx;
        S.selectedEvIdx2 = -1;
    }
    updateEventList();
    updateIntervalPanel();
    render();
}

// ================ MOUSE / INTERACTION ============================
const SNAP_RADIUS = 12; // pixels

function getWLVertexAtScreen(sx, sy) {
    for (let w = S.worldlines.length - 1; w >= 0; w--) {
        for (let p = S.worldlines[w].points.length - 1; p >= 0; p--) {
            const pt = S.worldlines[w].points[p];
            const sp = worldToScreen(pt.x, pt.t);
            // Check proximity to vertex itself
            if (Math.hypot(sp.x - sx, sp.y - sy) < SNAP_RADIUS) return { wlIdx: w, ptIdx: p };
            // Also check proximity to delete button (so it stays visible while clicking it)
            if (pt._delBtn && Math.hypot(sx - pt._delBtn.x, sy - pt._delBtn.y) < pt._delBtn.r + 4) {
                return { wlIdx: w, ptIdx: p };
            }
        }
    }
    return null;
}

function deleteWLVertex(wlIdx, ptIdx) {
    const wl = S.worldlines[wlIdx];
    wl.points.splice(ptIdx, 1);
    if (wl.points.length === 0) {
        deleteWorldline(wlIdx);
    } else {
        if (S.observer.fromWL === wlIdx && wl.points.length !== 2) clearObserver();
        updateWorldlineList();
    }
    S.hoveredWLVertex = null;
    render();
}

function getEventAtScreen(sx, sy) {
    for (let i = S.events.length - 1; i >= 0; i--) {
        const ev = S.events[i];
        const sp = worldToScreen(ev.x, ev.t);
        if (Math.hypot(sp.x - sx, sp.y - sy) < SNAP_RADIUS) return i;
        // Also check proximity to delete button so it stays visible
        if (ev._delBtn && Math.hypot(sx - ev._delBtn.x, sy - ev._delBtn.y) < ev._delBtn.r + 4) return i;
    }
    return -1;
}

canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const w = screenToWorld(sx, sy);

    // ---- Delete button clicks work in ALL modes ----
    // Check event delete buttons
    for (let i = S.events.length - 1; i >= 0; i--) {
        const btn = S.events[i]._delBtn;
        if (btn && Math.hypot(sx - btn.x, sy - btn.y) < btn.r) {
            deleteEvent(i);
            return;
        }
    }
    // Check worldline vertex delete buttons
    for (const wl of S.worldlines) {
        for (const p of wl.points) {
            if (p._delBtn && Math.hypot(sx - p._delBtn.x, sy - p._delBtn.y) < p._delBtn.r) {
                deleteWLVertex(S.worldlines.indexOf(wl), wl.points.indexOf(p));
                return;
            }
        }
    }

    // ---- Drag extended worldlines (pan/worldline mode only) ----
    if (S.mode !== 'event') {
        for (let i = 0; i < S.worldlines.length; i++) {
            const wl = S.worldlines[i];
            if (wl.extended && hitTestExtendedLine(wl, sx, sy, 8)) {
                const v = getWLVertexAtScreen(sx, sy);
                if (v && v.wlIdx === i) continue;
                S.dragExtWL = i;
                S.dragExtStartX = w.x;
                S.dragExtOrigPts = wl.points.map(p => ({ x: p.x, t: p.t }));
                canvas.style.cursor = 'ew-resize';
                return;
            }
        }
    }

    // ---- Drag S' frame origin (pan/worldline mode only) ----
    if (S.mode !== 'event' && S.observer.active && hitTestObserverAxes(sx, sy, 8)) {
        S.dragObserver = true;
        S.dragObsStartX = w.x;
        S.dragObsOrigX0 = S.observer.x0;
        canvas.style.cursor = 'ew-resize';
        return;
    }

    // ---- Mode-specific actions ----
    if (S.mode === 'pan') {
        S.isPanning = true;
        S.panStart = { x: sx, y: sy };
        S.panStartCenter = { ...S.center };
        canvas.style.cursor = 'grabbing';
        return;
    }

    if (S.mode === 'event') {
        // Check if clicking an existing event
        const idx = getEventAtScreen(sx, sy);
        if (idx >= 0) {
            if (e.shiftKey && S.selectedEvIdx >= 0 && S.selectedEvIdx !== idx) {
                // Shift+click: select pair for interval
                S.selectedEvIdx2 = idx;
                updateEventList();
                updateIntervalPanel();
                render();
                return;
            }
            S.dragEvIdx = idx;
            S.selectedEvIdx = idx;
            S.selectedEvIdx2 = -1;
            canvas.style.cursor = 'grabbing';
            updateEventList();
            updateIntervalPanel();
            render();
            return;
        }
        // Place new event (snap to worldline → S' grid → S grid)
        const wlSnap = snapToWorldlineIfNear(w, e.shiftKey);
        if (wlSnap) {
            addEvent(wlSnap.x, wlSnap.t);
        } else {
            const spSnap = snapToPrimedGrid(w);
            if (spSnap) {
                addEvent(spSnap.x, spSnap.t);
            } else {
                const es = snapPt(w);
                addEvent(es.x, es.t);
            }
        }
        return;
    }

    if (S.mode === 'worldline') {
        // Check if clicking a vertex to drag it
        const vtx = getWLVertexAtScreen(sx, sy);
        if (vtx) {
            S.dragWLVertex = vtx;
            canvas.style.cursor = 'grabbing';
            return;
        }
        // Check if clicking a ghost line to extend it
        for (let i = 0; i < S.worldlines.length; i++) {
            const wl = S.worldlines[i];
            if (wl.points.length === 2 && !wl.extended && hitTestGhostLine(wl, sx, sy, 8)) {
                wl.extended = true;
                updateWorldlineList();
                render();
                return;
            }
        }
        // Start new worldline if none active
        if (S.currentWL < 0 || S.currentWL >= S.worldlines.length) {
            startNewWorldline();
        }
        const ws = snapPt(w);
        S.worldlines[S.currentWL].points.push({ x: ws.x, t: ws.t });
        updateWorldlineList();
        render();
    }
});

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    S.mouseScreen = { x: sx, y: sy };
    S.mouseWorld = screenToWorld(sx, sy);

    if (S.isPanning) {
        const dx = sx - S.panStart.x;
        const dy = sy - S.panStart.y;
        S.center.x = S.panStartCenter.x - dx / S.zoom;
        S.center.t = S.panStartCenter.t + dy / S.zoom;
        render();
        return;
    }

    if (S.dragExtWL >= 0) {
        const wl = S.worldlines[S.dragExtWL];
        const deltaX = S.mouseWorld.x - S.dragExtStartX;
        const snappedDelta = snapToGrid(S.dragExtOrigPts[0].x + deltaX) - S.dragExtOrigPts[0].x;
        wl.points[0].x = S.dragExtOrigPts[0].x + snappedDelta;
        wl.points[0].t = S.dragExtOrigPts[0].t;
        wl.points[1].x = S.dragExtOrigPts[1].x + snappedDelta;
        wl.points[1].t = S.dragExtOrigPts[1].t;
        // Update observer if this worldline is the active observer
        if (S.observer.fromWL === S.dragExtWL) {
            const dt = wl.points[1].t - wl.points[0].t;
            const dx = wl.points[1].x - wl.points[0].x;
            const beta = dx / dt;
            const x0new = wl.points[0].x - beta * wl.points[0].t;
            S.observer.x0 = x0new;
            document.getElementById('x0Slider').value = x0new;
            document.getElementById('x0Val').textContent = x0new.toFixed(2);
            updateObserverInfo();
        }
        updateWorldlineList();
        render();
        return;
    }

    if (S.dragWLVertex) {
        const wl = S.worldlines[S.dragWLVertex.wlIdx];
        if (wl) {
            const pt = wl.points[S.dragWLVertex.ptIdx];
            if (pt) {
                const snapped = snapPt(S.mouseWorld);
                pt.x = snapped.x;
                pt.t = snapped.t;
                // Update observer if this worldline is the active observer
                if (S.observer.fromWL === S.dragWLVertex.wlIdx && wl.points.length === 2) {
                    const dt = wl.points[1].t - wl.points[0].t;
                    const dx = wl.points[1].x - wl.points[0].x;
                    if (Math.abs(dt) > 1e-12) {
                        const beta = dx / dt;
                        if (Math.abs(beta) < 1) {
                            const x0new = wl.points[0].x - beta * wl.points[0].t;
                            S.observer.beta = beta;
                            S.observer.x0 = x0new;
                            S.observer.gamma = 1 / Math.sqrt(1 - beta * beta);
                            document.getElementById('betaSlider').value = beta;
                            document.getElementById('betaVal').textContent = beta.toFixed(3);
                            document.getElementById('x0Slider').value = x0new;
                            document.getElementById('x0Val').textContent = x0new.toFixed(2);
                            updateObserverInfo();
                        }
                    }
                }
                updateWorldlineList();
                updateEventList();
                render();
            }
        }
        return;
    }

    if (S.dragObserver) {
        const deltaX = S.mouseWorld.x - S.dragObsStartX;
        const newX0 = snapToGrid(S.dragObsOrigX0 + deltaX);
        S.observer.x0 = newX0;
        document.getElementById('x0Slider').value = newX0;
        document.getElementById('x0Val').textContent = newX0.toFixed(2);
        updateObserverInfo();
        updateEventList();
        render();
        return;
    }

    if (S.dragEvIdx >= 0) {
        // Try snapping: worldline → S' grid → S grid
        const wlSnap = snapToWorldlineIfNear(S.mouseWorld, e.shiftKey);
        if (wlSnap) {
            S.events[S.dragEvIdx].x = wlSnap.x;
            S.events[S.dragEvIdx].t = wlSnap.t;
        } else {
            const spSnap = snapToPrimedGrid(S.mouseWorld);
            if (spSnap) {
                S.events[S.dragEvIdx].x = spSnap.x;
                S.events[S.dragEvIdx].t = spSnap.t;
            } else {
                const ds = snapPt(S.mouseWorld);
                S.events[S.dragEvIdx].x = ds.x;
                S.events[S.dragEvIdx].t = ds.t;
            }
        }
        updateEventList();
        render();
        return;
    }

    // Hover detection for worldline vertices
    const prevWLHover = S.hoveredWLVertex;
    S.hoveredWLVertex = getWLVertexAtScreen(sx, sy);
    const wlHoverChanged = (prevWLHover === null) !== (S.hoveredWLVertex === null) ||
        (prevWLHover && S.hoveredWLVertex && (prevWLHover.wlIdx !== S.hoveredWLVertex.wlIdx || prevWLHover.ptIdx !== S.hoveredWLVertex.ptIdx));

    // Always re-render if there are extended worldlines (for axis↔edit transition)
    const hasExtended = S.worldlines.some(wl => wl.extended);

    // Hover detection for events
    const prevHover = S.hoveredEvIdx;
    S.hoveredEvIdx = getEventAtScreen(sx, sy);
    if (S.hoveredEvIdx !== prevHover || wlHoverChanged || hasExtended) render();
    else {
        // Just update readout without full render
        const hasObs = S.observer.active && Math.abs(S.observer.beta) > 1e-9;
        updateReadout(hasObs, S.observer.beta, S.observer.x0);
    }
});

canvas.addEventListener('mouseup', () => {
    S.isPanning = false;
    S.dragEvIdx = -1;
    S.dragExtWL = -1;
    S.dragExtOrigPts = null;
    S.dragObserver = false;
    S.dragWLVertex = null;
    canvas.style.cursor = S.mode === 'pan' ? 'grab' : 'crosshair';
});

canvas.addEventListener('mouseleave', () => {
    S.isPanning = false;
    S.dragEvIdx = -1;
    S.dragExtWL = -1;
    S.dragExtOrigPts = null;
    S.dragObserver = false;
    S.dragWLVertex = null;
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const wBefore = screenToWorld(sx, sy);

    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    S.zoom = Math.max(5, Math.min(500, S.zoom * factor));

    // Zoom toward mouse position
    const wAfter = screenToWorld(sx, sy);
    S.center.x -= (wAfter.x - wBefore.x);
    S.center.t -= (wAfter.t - wBefore.t);

    render();
}, { passive: false });

// ================= MODE & UI CONTROLS ============================
document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        S.mode = btn.dataset.mode;
        canvas.style.cursor = S.mode === 'pan' ? 'grab' : 'crosshair';
        updateInstructions();
    });
});

document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        S.units = btn.dataset.unit;
        render();
    });
});

function updateInstructions() {
    const bar = document.getElementById('instrBar');
    if (S.mode === 'pan') bar.textContent = 'Scroll to zoom · Drag to pan';
    else if (S.mode === 'worldline') bar.textContent = 'Click to add vertices · Click dashed line to extend as axis · "New Worldline" for another';
    else bar.textContent = 'Click to place event · Drag to move · Hover for ✕ delete';
}

// Beta presets
const BETA_PRESETS = [
    { label: '3/5', value: 3/5 },
    { label: '4/5', value: 4/5 },
    { label: '5/13', value: 5/13 },
    { label: '12/13', value: 12/13 },
    { label: '8/17', value: 8/17 },
    { label: '15/17', value: 15/17 },
    { label: '7/25', value: 7/25 },
    { label: '24/25', value: 24/25 },
    { label: '0.9', value: 0.9 },
    { label: '0.99', value: 0.99 },
    { label: '0.999', value: 0.999 },
    { label: '−3/5', value: -3/5 },
];

function setupBetaPresets() {
    const container = document.getElementById('betaPresets');
    BETA_PRESETS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'beta-btn';
        btn.textContent = p.label;
        btn.addEventListener('click', () => {
            document.querySelectorAll('.beta-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('betaSlider').value = p.value;
            document.getElementById('betaVal').textContent = p.value.toFixed(3);
            setObserver(p.value, parseFloat(document.getElementById('x0Slider').value));
        });
        container.appendChild(btn);
    });
}

document.getElementById('betaSlider').addEventListener('input', e => {
    const beta = parseFloat(e.target.value);
    document.getElementById('betaVal').textContent = beta.toFixed(3);
    document.querySelectorAll('.beta-btn').forEach(b => b.classList.remove('active'));
    if (Math.abs(beta) > 1e-6) {
        setObserver(beta, parseFloat(document.getElementById('x0Slider').value));
    } else {
        clearObserver();
    }
});

document.getElementById('x0Slider').addEventListener('input', e => {
    const x0 = parseFloat(e.target.value);
    document.getElementById('x0Val').textContent = x0.toFixed(2);
    if (S.observer.active) {
        setObserver(S.observer.beta, x0);
    }
});

// Click-to-edit for β and x₀ value labels
function makeEditable(spanId, onCommit) {
    const span = document.getElementById(spanId);
    span.addEventListener('click', () => {
        const currentVal = span.textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'value-input';
        input.value = currentVal;
        span.replaceWith(input);
        input.focus();
        input.select();
        const commit = () => {
            let val = input.value.trim();
            // Support fraction input like "3/5" or "-12/13"
            if (val.includes('/')) {
                const parts = val.split('/');
                if (parts.length === 2) {
                    const num = parseFloat(parts[0]), den = parseFloat(parts[1]);
                    if (!isNaN(num) && !isNaN(den) && den !== 0) val = (num / den).toString();
                }
            }
            const numVal = parseFloat(val);
            const newSpan = document.createElement('span');
            newSpan.className = 'value';
            newSpan.id = spanId;
            input.replaceWith(newSpan);
            if (!isNaN(numVal)) {
                onCommit(numVal);
            } else {
                newSpan.textContent = currentVal;
            }
            // Re-attach click handler
            makeEditable(spanId, onCommit);
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
            if (e.key === 'Escape') { input.value = currentVal; input.blur(); }
        });
    });
}

makeEditable('betaVal', val => {
    const beta = Math.max(-0.999, Math.min(0.999, val));
    document.getElementById('betaVal').textContent = beta.toFixed(3);
    document.getElementById('betaSlider').value = beta;
    document.querySelectorAll('.beta-btn').forEach(b => b.classList.remove('active'));
    if (Math.abs(beta) > 1e-6) {
        setObserver(beta, parseFloat(document.getElementById('x0Slider').value));
    } else {
        clearObserver();
    }
});

makeEditable('x0Val', val => {
    document.getElementById('x0Val').textContent = val.toFixed(2);
    document.getElementById('x0Slider').value = val;
    if (S.observer.active) {
        setObserver(S.observer.beta, val);
    }
});

// Toggle checkboxes
document.querySelectorAll('.toggle-row input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
        render();
        updateEventList();
    });
});

// New worldline button
document.getElementById('newWlBtn').addEventListener('click', () => {
    startNewWorldline();
    // Switch to worldline mode
    S.mode = 'worldline';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('modeWL').classList.add('active');
    canvas.style.cursor = 'crosshair';
    updateInstructions();
});

// ===================== KEYBOARD ==================================
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        S.selectedEvIdx = -1;
        S.mode = 'pan';
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('modePan').classList.add('active');
        canvas.style.cursor = 'grab';
        updateInstructions();
        updateEventList();
        render();
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (document.activeElement.tagName === 'INPUT') return;
        // Delete hovered worldline vertex
        if (S.hoveredWLVertex) {
            deleteWLVertex(S.hoveredWLVertex.wlIdx, S.hoveredWLVertex.ptIdx);
            e.preventDefault();
            return;
        }
        // Delete selected event
        if (S.selectedEvIdx >= 0) {
            deleteEvent(S.selectedEvIdx);
            e.preventDefault();
        }
    }
});

// ====================== INIT =====================================
function init() {
    setupBetaPresets();
    resizeCanvas();
    canvas.style.cursor = 'grab';
    updateInstructions();
    render();
}

init();
