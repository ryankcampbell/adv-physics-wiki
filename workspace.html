<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Workspace — Advanced Physics</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
    }
    .header-title { font-size: 0.95rem; font-weight: 700; color: #7eb8da; }
    .header-name  { font-size: 0.85rem; color: #94a3b8; }
    .header-name span { color: #e2e8f0; font-weight: 600; text-transform: capitalize; }
    .logout-btn {
      margin-left: auto; background: none; border: 1px solid #334155;
      color: #64748b; border-radius: 5px; padding: 5px 12px;
      font-size: 0.75rem; cursor: pointer;
    }
    .logout-btn:hover { color: #e2e8f0; border-color: #475569; }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 28px 20px; }
    .page-heading {
      font-size: 1.15rem; font-weight: 700; color: #e2e8f0; margin-bottom: 6px;
    }
    .page-sub { font-size: 0.8rem; color: #64748b; margin-bottom: 24px; }

    /* ── New IC button ── */
    .new-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #2563eb; color: white; border: none; border-radius: 7px;
      padding: 9px 18px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; margin-bottom: 28px;
    }
    .new-btn:hover { background: #1d4ed8; }

    /* ── Topic cards ── */
    .topics-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .topic-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      padding: 16px 18px; cursor: pointer; transition: border-color 0.15s;
    }
    .topic-card:hover { border-color: #7eb8da; }
    .topic-card.locked { opacity: 0.6; cursor: default; }
    .topic-module { font-size: 0.68rem; color: #64748b; text-transform: uppercase;
                    letter-spacing: 0.07em; margin-bottom: 5px; }
    .topic-title  { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; margin-bottom: 10px; }
    .topic-footer { display: flex; align-items: center; justify-content: space-between; }
    .stage-badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 9px;
      border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-draft    { background: #1e3a5f; color: #7eb8da; }
    .badge-submitted { background: #422006; color: #f59e0b; }
    .badge-revision  { background: #450a0a; color: #f87171; }
    .badge-complete  { background: #052e16; color: #4ade80; }
    .continue-btn {
      font-size: 0.72rem; color: #7eb8da; background: none; border: none;
      cursor: pointer; padding: 0;
    }
    .continue-btn:hover { text-decoration: underline; }
    .topic-notes {
      font-size: 0.73rem; color: #f87171; margin-top: 8px;
      background: #450a0a22; border-left: 2px solid #dc2626;
      padding: 5px 8px; border-radius: 0 4px 4px 0;
    }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #475569;
    }
    .empty-state .big { font-size: 2rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.85rem; }
    /* AT investigation progress bar */
    .at-progress-wrap { margin: 6px 0 2px; }
    .at-progress-bar { height: 4px; background: #0f172a; border-radius: 2px; overflow: hidden; }
    .at-progress-fill { height: 100%; background: #7c2d12; border-radius: 2px; transition: width 0.3s; }
    .at-progress-fill.complete { background: #16a34a; }
    .at-progress-label { font-size: 0.68rem; color: #64748b; margin-top: 3px; }

    /* ── New topic modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 28px 28px; width: 100%; max-width: 400px;
    }
    .modal h2 { font-size: 1rem; color: #e2e8f0; margin-bottom: 20px; }
    .modal label { display: block; font-size: 0.78rem; color: #94a3b8;
                   margin-bottom: 5px; margin-top: 14px; }
    .modal input, .modal select {
      width: 100%; padding: 9px 11px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 0.88rem;
    }
    .modal input:focus, .modal select:focus { outline: none; border-color: #7eb8da; }
    .modal-btns { display: flex; gap: 8px; margin-top: 22px; }
    .modal-btns .cancel { flex: 1; padding: 9px; background: none;
      border: 1px solid #334155; color: #94a3b8; border-radius: 6px;
      font-size: 0.85rem; cursor: pointer; }
    .modal-btns .submit { flex: 1; padding: 9px; background: #2563eb;
      color: white; border: none; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .modal-btns .submit:hover { background: #1d4ed8; }
    .modal-error { font-size: 0.78rem; color: #f87171; margin-top: 10px; min-height: 18px; }

    /* ── Bug report button + modal ── */
    .bug-btn {
      background: none; border: 1px solid #334155; color: #64748b;
      border-radius: 5px; padding: 5px 11px; font-size: 0.75rem; cursor: pointer;
    }
    .bug-btn:hover { color: #f87171; border-color: #7f1d1d; }
    #bug-modal textarea {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 0.85rem; padding: 9px 11px;
      resize: vertical; min-height: 90px; font-family: inherit;
    }
    #bug-modal textarea:focus { outline: none; border-color: #7eb8da; }
    #bug-snap-zone {
      margin-top: 12px; border: 2px dashed #334155; border-radius: 8px;
      padding: 14px; text-align: center; cursor: pointer; transition: border-color 0.15s;
      font-size: 0.78rem; color: #64748b; position: relative;
    }
    #bug-snap-zone:hover, #bug-snap-zone.drag-over { border-color: #7eb8da; color: #7eb8da; }
    #bug-snap-zone.has-image { border-color: #334155; padding: 6px; }
    #bug-snap-preview {
      display: none; max-width: 100%; border-radius: 5px; max-height: 160px;
      object-fit: contain;
    }
    #bug-snap-zone.has-image #bug-snap-preview { display: block; margin: 0 auto; }
    #bug-snap-zone.has-image .snap-hint { display: none; }
    #bug-snap-clear {
      display: none; position: absolute; top: 6px; right: 8px;
      background: #7f1d1d; color: white; border: none; border-radius: 4px;
      font-size: 0.7rem; padding: 2px 7px; cursor: pointer;
    }
    #bug-snap-zone.has-image #bug-snap-clear { display: block; }
    #bug-status { font-size: 0.78rem; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>

<header>
  <div class="header-title">✦ Advanced Physics</div>
  <div class="header-name">Signed in as <span id="header-name">—</span></div>
  <a href="index.html" style="margin-left:auto;color:#7eb8da;font-size:0.78rem;font-weight:600;text-decoration:none;white-space:nowrap">Concept Navigator →</a>
  <button class="bug-btn" onclick="openBugModal()" title="Report a bug or technical issue">⚑ Report Bug</button>
  <button class="logout-btn" onclick="logout()">Sign out</button>
</header>

<main>
  <div class="page-heading">My Insight Cards</div>
  <div class="page-sub">Each row is one topic. Click to continue where you left off.</div>

  <button class="new-btn" onclick="openNewModal()">+ New Insight Card</button>

  <div class="topics-grid" id="topics-grid">
    <div class="empty-state">
      <div class="big">📝</div>
      <p>Loading your topics…</p>
    </div>
  </div>
</main>

<!-- Bug report modal -->
<div class="modal-overlay" id="bug-modal">
  <div class="modal" style="max-width:460px">
    <h2>⚑ Report a Bug</h2>
    <label style="margin-top:0">Describe what happened</label>
    <textarea id="bug-desc" placeholder="e.g. When I click Submit, the page goes blank and nothing uploads…" rows="4"></textarea>
    <label style="margin-top:12px">Screenshot (optional)</label>
    <div id="bug-snap-zone"
      onclick="document.getElementById('bug-snap-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="handleBugDrop(event)">
      <span class="snap-hint">Click to upload, drag an image, or paste (Ctrl+V) a screenshot</span>
      <img id="bug-snap-preview" src="" alt="snapshot preview">
      <button id="bug-snap-clear" onclick="event.stopPropagation();clearBugSnap()">✕ Remove</button>
    </div>
    <input type="file" id="bug-snap-input" accept="image/*" style="display:none"
      onchange="loadBugSnapFile(this.files[0])">
    <div id="bug-status"></div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeBugModal()">Cancel</button>
      <button class="submit" onclick="submitBugReport()">Send Report</button>
    </div>
  </div>
</div>

<!-- New topic modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <h2>Start a new Insight Card</h2>
    <label>Module</label>
    <select id="new-module" onchange="populateConceptDropdown()" style="width:100%;padding:10px 12px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:0.9rem;margin-bottom:14px">
      <option value="">— Select a module —</option>
    </select>
    <label>Concept</label>
    <select id="new-concept" onchange="conceptSelected()" style="width:100%;padding:10px 12px;border-radius:7px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:0.9rem;margin-bottom:14px">
      <option value="">— Select a module first —</option>
    </select>
    <div class="modal-error" id="new-error"></div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeNewModal()">Cancel</button>
      <button class="submit" onclick="startTopic()">Start</button>
    </div>
  </div>
</div>

<script>
const STUDENT_TOKEN_KEY = 'student-session-token';
const STUDENT_NAME_KEY  = 'student-name';
const SIM_TOKEN_KEY     = 'sim-session-token';

const token = localStorage.getItem(STUDENT_TOKEN_KEY);
const name  = localStorage.getItem(STUDENT_NAME_KEY);

// Guard: must be logged in
if (!token || !name) { window.location.href = 'student.html'; }

document.getElementById('header-name').textContent =
  name.replace(/\b\w/g, c => c.toUpperCase());

function authHeaders() {
  return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

// ── Stage display helpers ──────────────────────────────────────────
const STAGE_LABELS = {
  'ic+draft':          { text: 'Writing IC',           cls: 'badge-draft' },
  'ic+submitted':      { text: 'IC submitted',         cls: 'badge-submitted' },
  'ic+needs_revision': { text: 'Revise IC',            cls: 'badge-revision' },
  'at+draft':          { text: 'Adversarial Test',     cls: 'badge-draft' },
  'at+submitted':      { text: 'AT submitted',         cls: 'badge-submitted' },
  'at+needs_revision': { text: 'Revise AT',            cls: 'badge-revision' },
  'hw+draft':          { text: 'HW Questions',         cls: 'badge-draft' },
  'hw+submitted':      { text: 'HW submitted',         cls: 'badge-submitted' },
  'hw+needs_revision': { text: 'Revise HW',            cls: 'badge-revision' },
  'complete+complete': { text: 'Complete',             cls: 'badge-complete' },
};

function getBadge(stage, status) {
  const key = `${stage}+${status}`;
  return STAGE_LABELS[key] || { text: `${stage} / ${status}`, cls: 'badge-draft' };
}

let _fullATEnabled = false; // loaded on startup

function editorUrl(topic) {
  const s = topic.slug;
  const t = encodeURIComponent(topic.title);
  if (topic.stage === 'ic') return `ic_editor.html?concept=${s}&name=${t}`;
  if (topic.stage === 'at') {
    if (_fullATEnabled) {
      const atSess = JSON.parse(localStorage.getItem(`at-session-${s}`) || 'null');
      const doneCount  = (atSess?.completed  || []).length;
      const totalCount = (atSess?.selectedTools || []).length;
      if (atSess && totalCount > 0 && doneCount >= totalCount) return `ic_editor.html?at=${s}`;
      if (atSess?.selectedTools?.length) return `at_workspace.html?concept=${s}`;
    }
    return `ic_editor.html?at=${s}`;
  }
  if (topic.stage === 'hw') return `hw_workspace.html?concept=${s}`;
  return null; // complete
}

function getATProgress(slug) {
  try {
    const sess = JSON.parse(localStorage.getItem(`at-session-${slug}`) || 'null');
    if (!sess?.selectedTools?.length) return null;
    return { done: (sess.completed || []).length, total: sess.selectedTools.length };
  } catch { return null; }
}

function canContinue(topic) {
  return topic.stage !== 'complete' && topic.status !== 'submitted';
}

// ── Load topics ────────────────────────────────────────────────────
async function loadTopics() {
  try {
    const r = await fetch('/api/student/topics', { headers: authHeaders() });
    if (r.status === 401) { logout(); return; }
    const { topics } = await r.json();
    renderTopics(topics);
    populateModuleSuggestions(topics);
  } catch(e) {
    document.getElementById('topics-grid').innerHTML =
      '<div class="empty-state"><p>Could not reach server.</p></div>';
  }
}

function renderTopics(topics) {
  const grid = document.getElementById('topics-grid');
  const entries = Object.entries(topics).map(([slug, t]) => ({ ...t, slug }));
  if (!entries.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="big">📝</div>
      <p>No Insight Cards yet.<br>Click <strong>+ New Insight Card</strong> to get started.</p>
    </div>`;
    return;
  }
  // Sort: needs_revision first, then draft, then submitted, then complete
  const order = { needs_revision: 0, draft: 1, submitted: 2, complete: 3 };
  entries.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  grid.innerHTML = '';
  entries.forEach(topic => {
    const badge = getBadge(topic.stage, topic.status);
    const url   = editorUrl(topic);
    const canGo = canContinue(topic);
    const card  = document.createElement('div');
    card.className = 'topic-card' + (canGo ? '' : ' locked');
    if (canGo && url) card.onclick = () => window.location.href = url;

    // AT progress (read from localStorage — sync)
    let atProgressHTML = '';
    if (topic.stage === 'at') {
      const prog = getATProgress(topic.slug);
      if (prog) {
        const pct = Math.round(prog.done / prog.total * 100);
        const cls = prog.done >= prog.total ? ' complete' : '';
        atProgressHTML = `<div class="at-progress-wrap">
          <div class="at-progress-bar"><div class="at-progress-fill${cls}" style="width:${pct}%"></div></div>
          <div class="at-progress-label">AT investigation: ${prog.done}/${prog.total} tools complete</div>
        </div>`;
      }
    }

    card.innerHTML = `
      <div class="topic-module">${topic.module || 'General'}</div>
      <div class="topic-title">${topic.title}</div>
      ${topic.revision_notes ? `<div class="topic-notes">📋 ${topic.revision_notes}</div>` : ''}
      ${atProgressHTML}
      <div class="topic-footer">
        <span class="stage-badge ${badge.cls}">${badge.text}</span>
        ${canGo && url ? '<span class="continue-btn">Continue →</span>' : ''}
        ${topic.status === 'submitted' ? '<span style="font-size:0.7rem;color:#64748b">Awaiting review</span>' : ''}
        ${topic.stage === 'complete' ? '<span style="font-size:0.7rem;color:#4ade80">✓ Published</span>' : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

async function populateModuleSuggestions(topics) {
  // Seed from student's own prior topics
  const modules = new Set(Object.values(topics).map(t => t.module).filter(Boolean));
  // Also pull module names from state.json concept list
  try {
    const state = await fetch('state/state.json').then(r => r.ok ? r.json() : []);
    state.forEach(s => { if (s.module) modules.add(s.module); });
  } catch {}
  const dl = document.getElementById('module-suggestions');
  modules.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    dl.appendChild(opt);
  });
}

// ── New topic modal ────────────────────────────────────────────────
function openNewModal() {
  document.getElementById('new-module').value = '';
  document.getElementById('new-concept').innerHTML = '<option value="">— Select a module first —</option>';
  document.getElementById('new-error').textContent = '';
  document.getElementById('new-modal').classList.add('open');
  document.getElementById('new-module').focus();
}
function closeNewModal() {
  document.getElementById('new-modal').classList.remove('open');
}

// ── Module / concept dropdowns ─────────────────────────────────────
const MODULE_FILES = [
  { file: 'modules/special_relativity.json',  label: 'Special Relativity' },
  { file: 'modules/geometric_optics.json',    label: 'Geometric Optics' },
  { file: 'modules/physical_optics.json',     label: 'Physical Optics' },
  { file: 'modules/quantum_spin.json',        label: 'Quantum Spin' },
];
let _moduleCache = {};

async function loadModuleDropdown() {
  const sel = document.getElementById('new-module');
  for (const m of MODULE_FILES) {
    const opt = document.createElement('option');
    opt.value = m.file;
    opt.textContent = m.label;
    sel.appendChild(opt);
  }
}

async function populateConceptDropdown() {
  const moduleFile = document.getElementById('new-module').value;
  const conceptSel = document.getElementById('new-concept');
  conceptSel.innerHTML = '<option value="">— Select a concept —</option>';
  if (!moduleFile) return;
  if (!_moduleCache[moduleFile]) {
    const r = await fetch(moduleFile);
    _moduleCache[moduleFile] = await r.json();
  }
  const mod = _moduleCache[moduleFile];
  (mod.concepts || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = JSON.stringify({ id: c.id, name: c.name, module: mod.module });
    opt.textContent = c.name;
    conceptSel.appendChild(opt);
  });
}

function conceptSelected() {
  document.getElementById('new-error').textContent = '';
}

async function startTopic() {
  const conceptVal = document.getElementById('new-concept').value;
  const errEl = document.getElementById('new-error');
  if (!conceptVal) { errEl.textContent = 'Please select a concept.'; return; }
  const { id, name, module } = JSON.parse(conceptVal);

  try {
    const r = await fetch('/api/student/topic/start', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ module, title: name, concept_id: id })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'Could not start topic.'; return; }
    closeNewModal();
    window.location.href = `ic_editor.html?concept=${data.slug}&name=${encodeURIComponent(name)}`;
  } catch(e) {
    errEl.textContent = 'Connection error.';
  }
}

loadModuleDropdown();

// ── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeNewModal(); closeBugModal(); }
});

// ── Bug Report ─────────────────────────────────────────────────────
let bugSnapDataUrl = null;

function openBugModal() {
  document.getElementById('bug-desc').value = '';
  document.getElementById('bug-status').textContent = '';
  clearBugSnap();
  document.getElementById('bug-modal').classList.add('open');
  document.getElementById('bug-desc').focus();
}
function closeBugModal() {
  document.getElementById('bug-modal').classList.remove('open');
}

function loadBugSnapFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => setBugSnap(e.target.result);
  reader.readAsDataURL(file);
}
function handleBugDrop(e) {
  e.preventDefault();
  document.getElementById('bug-snap-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadBugSnapFile(file);
}
function setBugSnap(dataUrl) {
  bugSnapDataUrl = dataUrl;
  const zone = document.getElementById('bug-snap-zone');
  document.getElementById('bug-snap-preview').src = dataUrl;
  zone.classList.add('has-image');
}
function clearBugSnap() {
  bugSnapDataUrl = null;
  document.getElementById('bug-snap-preview').src = '';
  document.getElementById('bug-snap-zone').classList.remove('has-image');
  document.getElementById('bug-snap-input').value = '';
}

// Paste anywhere in the modal captures clipboard images
document.getElementById('bug-modal').addEventListener('paste', e => {
  const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (item) { e.preventDefault(); loadBugSnapFile(item.getAsFile()); }
});

async function submitBugReport() {
  const desc = document.getElementById('bug-desc').value.trim();
  const statusEl = document.getElementById('bug-status');
  if (!desc) { statusEl.style.color = '#f87171'; statusEl.textContent = 'Please describe the issue first.'; return; }

  statusEl.style.color = '#94a3b8';
  statusEl.textContent = 'Sending…';

  try {
    const r = await fetch('/api/bug-report', {
      method: 'POST',
      headers: { ...authHeaders() },
      body: JSON.stringify({ description: desc, snapshot: bugSnapDataUrl, page: 'workspace' })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Server error');
    statusEl.style.color = '#4ade80';
    statusEl.textContent = '✓ Report sent — thanks!';
    setTimeout(closeBugModal, 1400);
  } catch(e) {
    statusEl.style.color = '#f87171';
    statusEl.textContent = 'Could not send: ' + e.message;
  }
}

// ── Logout ─────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem(STUDENT_TOKEN_KEY);
  localStorage.removeItem(STUDENT_NAME_KEY);
  localStorage.removeItem(SIM_TOKEN_KEY);
  window.location.href = 'index.html';
}

fetch('/api/public/settings').then(r => r.json()).then(s => { _fullATEnabled = !!s.fullATEnabled; }).catch(() => {});
loadTopics();
</script>
</body>
</html>
