<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time Dilation Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; padding: 24px; }
    h2 { font-size: 1rem; color: #93c5fd; margin-bottom: 16px; }
    .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    label { font-size: 0.85rem; color: #94a3b8; }
    input[type=range] { width: 220px; accent-color: #3b82f6; }
    .val { font-size: 1.1rem; font-weight: 700; color: #60a5fa; min-width: 60px; }
    .clocks { display: flex; gap: 32px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .clock-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px 28px; text-align: center; min-width: 160px; }
    .clock-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 10px; }
    .clock-face { font-size: 2rem; font-weight: 700; font-family: monospace; color: #f1f5f9; }
    .clock-moving .clock-face { color: #34d399; }
    .gamma-box { text-align: center; font-size: 0.9rem; color: #94a3b8; margin-bottom: 16px; }
    .gamma-box span { color: #fbbf24; font-weight: 700; font-size: 1.1rem; }
    canvas { display: block; margin: 0 auto; border-radius: 8px; background: #1e293b; }
  </style>
</head>
<body>

<h2>Time Dilation — Interactive Simulator</h2>

<div class="controls">
  <label>β (v/c):</label>
  <input type="range" id="beta" min="0" max="0.99" step="0.01" value="0.6">
  <div class="val" id="beta-val">0.60</div>
  <label style="margin-left:16px">γ =</label>
  <div class="val" id="gamma-val">1.25</div>
</div>

<div class="gamma-box">
  Moving clock runs slower by factor <span id="gamma-inline">1.25</span> —
  for every second on the stationary clock, only <span id="dtau">0.800</span> s passes on the moving clock.
</div>

<div class="clocks">
  <div class="clock-box">
    <div class="clock-label">Stationary Clock (S frame)</div>
    <div class="clock-face" id="t-stationary">0.000 s</div>
  </div>
  <div class="clock-box clock-moving">
    <div class="clock-label">Moving Clock (S′ frame)</div>
    <div class="clock-face" id="t-moving">0.000 s</div>
  </div>
</div>

<canvas id="canvas" width="560" height="120"></canvas>

<div style="margin-top:12px;text-align:center">
  <button id="btn" style="background:#3b82f6;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:0.85rem;cursor:pointer">▶ Start</button>
  <button onclick="reset()" style="background:#475569;color:white;border:none;border-radius:6px;padding:8px 16px;font-size:0.85rem;cursor:pointer;margin-left:8px">Reset</button>
</div>

<script>
let running = false;
let t_stat = 0, t_mov = 0;
let lastTime = null;
const btn = document.getElementById('btn');

function gamma(b) { return 1 / Math.sqrt(1 - b * b); }

document.getElementById('beta').addEventListener('input', function() {
  const b = parseFloat(this.value);
  const g = gamma(b);
  document.getElementById('beta-val').textContent = b.toFixed(2);
  document.getElementById('gamma-val').textContent = g.toFixed(4);
  document.getElementById('gamma-inline').textContent = g.toFixed(4);
  document.getElementById('dtau').textContent = (1/g).toFixed(4);
  drawBar(b);
});

function drawBar(b) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, W, H);

  // Labels
  ctx.fillStyle = '#64748b';
  ctx.font = '11px system-ui';
  ctx.fillText('β = 0', 8, H - 8);
  ctx.fillText('β = 1 (light speed)', W - 130, H - 8);

  // Track
  const pad = 20, trackY = H/2 - 10;
  ctx.fillStyle = '#334155';
  ctx.fillRect(pad, trackY, W - 2*pad, 12);

  // Moving clock bar (fraction of stationary)
  const frac = 1 / gamma(b);
  ctx.fillStyle = '#34d399';
  ctx.fillRect(pad, trackY, (W - 2*pad) * frac * (1 - b) + (W-2*pad)*b * 0 , 12);

  // Stationary bar (full)
  ctx.fillStyle = '#3b82f6';
  ctx.fillRect(pad, trackY - 18, (W - 2*pad), 12);

  ctx.fillStyle = '#93c5fd';
  ctx.font = '11px system-ui';
  ctx.fillText('Stationary (1 s per second)', pad + 4, trackY - 10);
  ctx.fillStyle = '#6ee7b7';
  ctx.fillText(`Moving  (${(1/gamma(b)).toFixed(3)} s per second)`, pad + 4, trackY + 9);

  // beta marker
  const markerX = pad + (W - 2*pad) * b;
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(markerX, trackY - 22);
  ctx.lineTo(markerX, trackY + 16);
  ctx.stroke();
}

function fmt(t) {
  return t.toFixed(3) + ' s';
}

function tick(ts) {
  if (!running) return;
  if (lastTime === null) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  const b = parseFloat(document.getElementById('beta').value);
  const g = gamma(b);
  t_stat += dt;
  t_mov  += dt / g;

  document.getElementById('t-stationary').textContent = fmt(t_stat);
  document.getElementById('t-moving').textContent     = fmt(t_mov);

  requestAnimationFrame(tick);
}

btn.addEventListener('click', function() {
  if (running) {
    running = false;
    lastTime = null;
    btn.textContent = '▶ Start';
  } else {
    running = true;
    btn.textContent = '⏸ Pause';
    requestAnimationFrame(tick);
  }
});

function reset() {
  running = false;
  lastTime = null;
  t_stat = 0; t_mov = 0;
  btn.textContent = '▶ Start';
  document.getElementById('t-stationary').textContent = '0.000 s';
  document.getElementById('t-moving').textContent     = '0.000 s';
}

// Init
drawBar(0.6);
</script>
</body>
</html>
